body:
  text: 數學鑰卷四凡例柘城杜知耕撰凡例一則形為體之界在上之界曰靣在下之界曰底底與面有長廣而無厚薄故底面之積曰平積二則體之縱者曰長衡者曰廣立者曰髙三則底面長廣及髙皆等者曰立方如第一圖底面皆方而髙不與長廣等者曰方體如第二圖長廣及髙皆不等而角方者曰直體亦曰直方體如第三圖底或方或直而傍為勾股形曰塹堵如第四圖底或方或直而傍為三角形曰芻蕘如第五圖底或方或圓或多邊而上鋭至盡者曰錐體如第六圖凡底面相等者即取底之形為體之名設底六邊即為六邊體如第七圖渾然無界無稜者曰渾體渾圓如第八圖渾撱圓如第九圖面長殺于底長而無廣者曰鋭脊如第十圖面之長廣各殺于底者曰鋭面如第十一圖上下皆有長無廣者曰鱉臑如第十二圖四則錐及鋭面等體自傍科量之度非正髙五邊七邊等底中長折半之㸃非正心五則線之度尺容十寸寸容十分形之度尺容百寸寸容百分體之度尺容千寸寸容千分六則相似兩形之比例為線與線再加之比例再加者謂兩線各自乘以為比例也相似兩體之比例為線與線三加之比例三加者謂兩線各自乘再乘以為比例也兩形有一度等者同兩線之比例兩體有一度等者同兩形之比例兩體有兩度等者亦同兩線之比例七則堆止一層曰平堆二層以上曰髙堆數學鑰卷四凡例欽定四庫全書數學鑰卷四目録柘城杜知耕撰少廣一則立方求積二則直體求積三則塹堵求積四則芻蕘求積五則三角體求積六則六邊體求積八邊十二邊附增七則五邊體求積九邊附八則圓體求積增九則撱圓體求積增十則弧矢體求積十一則錐體求積十二則諸雜線體求積西法十三則渾圓求積二法增十四則渾撱圓求積十五則鋭脊體求積增十六則鱉臑求積增十七則等廣鋭面體求積十八則鋭面方體求積十九則鋭面直體求積二法後法增二十則鋭面圓體求積增二十一則鋭面撱圖體求積西法二十二則諸鋭面體求積二十三則求錐體之正髙二十四則立方以積求邊一法即開立方法二十五則立方以積求邊二法增二十六則方體以積求邊一法即帶縱開立方法增二十七則方體以積求邊二法二十八則直體以積求邊一法增二十九則直體以積求邊二法三十則渾圓以積求徑增三十一則渾撱圓以積求徑三十二則三乘還原即開三乘方法附五乘七乘三十三則委粟求積三十四則倚壁委粟求積三十五則倚外角委粟求積三十六則倚內角委粟求積三十七則方平堆以周求積三十八則方平堆以積求周三十九則三角平堆以濶求積四十則三角平堆以積求濶四十一則梯形平堆以濶求積四十二則六邊平堆以邊求積四十三則六邊平堆以積求邊求周附四十四則塹堵髙堆求積四十五則方底髙堆求積四十六則三角髙堆求積四十七則直底髙堆求積四十八則直底鋭面堆求積四十九則三角鋭面堆求積數學鑰卷四目録欽定四庫全書數學鑰卷四柘城杜知耕撰少廣一則立方求積設立方方三尺求積法曰置三尺自乘得九尺再以三尺乘之得二十七尺即所求解曰算體之法先求底積即方圓等形求積詳一二卷以髙為底積倍數如圖長廣各三尺相乘得九尺為底積若髙二尺則二倍底積之數得一十八尺髙三尺則三倍底積之數得二十七尺二則直體求積設直體長七尺廣五尺髙一十二尺求積法曰以廣乘長得三十五尺以髙乘之得四百二十尺即所求解同前三則塹堵求積設塹堵長一十二尺廣五尺髙七尺求積法曰以廣乘長得六十尺以髙乘之得四百二十尺折半得二百一十尺即所求解曰甲乙丙丁直體與塹堵髙廣長各等依甲乙線丙乙稜分之必成二塹堵夫一直體既能當二塹堵則一塹堵必當半直體也故折半得積四則芻蕘求積設芻蕘長一十二尺廣五尺髙七尺求積法同塹堵解曰甲乙丙戊芻蕘依丙丁線丙戊脊分之必成二塹堵各為相當直方之半兩直方並必成一直方夫直方之兩分既倍于芻蕘之兩分直方之全體不倍于芻蕘之全體乎故亦折半得積同塹堵也五則三角體求積設三角體廣六尺中長五尺高一十二尺求積法曰置長廣相乘得三十尺以髙乘之得三百六十尺折半得一百八十尺即所求解曰即芻蕘但彼橫此縱耳勾股體同六則六邊體求積八邊及十二邊附設六邊體每邊廣二十尺中長三十四尺六寸四分有竒髙四十尺求積法曰置廣三因之得六十尺以長折半得一十七尺三寸二分零二毫乘之得一千零三十九尺二寸一分二釐為底積再以高乘之得四萬一千五百六十八尺四寸八分即所求解曰六邊底依各角分之成三角形六三角求積法以廣乘長折半一卷五則不折則得兩三角積故三因邊廣以底長之半乘之底之半長即三角之中長即得六三角積即全底積猶平圓半徑乘半周之義也二卷三則若無底長之度則取邊廣為弦全底分為六三角形每形之三邊俱等以甲乙為弦即以丙乙為弦也半廣為勾丁乙各自乘相減平方開之得股丙丁即底長之半六卷二則設八邊底每邊廣二十尺求底長即以二十尺折半為勾丁乙另置二十尺以七六五三六除之得二六一三一四强為弦丙乙各自乘相減平方開之得股丙丁即底長之半設十二邊底每邊廣二十尺求底長即以二十尺折半為勾丁乙另置二十尺以五一七六四除之得三八六三六八强為弦丙乙各自乘相減平方開之得股丙丁即底長之半按七六五三六乃四十五度弧之通弦四十五度為三百六十度八之一故以之除八邊底之一邊即得外切圓形之半徑五一七六四乃三十度弧之通弦三十度為三百六十度十二之一故以之除十二邊底之一邊即得外切圓形之半徑外切圓形之半徑即三角形之腰線丙乙也見大測及八線表七則五邊體求積設五邊體每邊廣二十尺中長三十尺零七寸七分六釐六毫强高四十尺求積法曰置邊廣以邊數五因之得一百尺折半得五十尺為實另置邊廣折半得十尺自乘得一百尺以中長除之得三尺二寸四分九釐一毫强與中長相減餘二十七尺五寸二分七釐四毫强折半得一十三尺七寸六分三釐七毫强為法乘實得六百八十八尺一寸八分八釐為底積再以高乘之得二萬七千五百二十七尺五寸二分即所求解曰五邊底依各角分之成三角形五欲求底積必先得三角積欲求三角積必先得三角之中長丙丁然上則六邊邊為偶數角與角相對邊與邊相對其全底之長即相對兩三角之中長令五邊邊為竒數邊與角相對其底長己丁小半為此三角之中線丙丁大半為彼三角之腰線己丙折半則得庚丁不能得丙丁也若欲得丙丁必先求己丙于己丁底長減去己丙餘即丁丙欲得己丙必先求外切圓形之己戊徑己戊折半即己丙欲得己戊必先求外切圓徑大于底長之丁戊底長加丁戊即己戊欲求丁戊則用弧矢以弦及餘徑求矢法二卷二十二則今邊廣甲戊乙弧矢形之甲乙弦也邊廣折半自乘丁乙半弦上方形也底長己丁餘徑也以除半弦上方形所得者丁戊矢也以矢減底長所餘者倍三角中長之辛丁也故半之為三角之中長又五因邊廣折半者取五三角底之半也若無底長之度則取邊廣折半為勾丁乙另置邊廣以一一七五五八除之得一七零一二八八為弦丙乙各自乘相減平方開之得股丙丁即三角形之中長六卷二則一一七五五八乃七十二度弧之通弦七十二度為三百六十度五之一故以之除五邊之一即得外切圓形之半徑丙乙為三角形之腰線也設九邊底每邊廣二十尺求三角分形之中長則以二十尺折半為勾丁乙另置二十尺以六八四零四除之得二九二三八為弦丙乙自乘相減平方開之得股丙丁即三角形之中長六八四零四乃四十度弧之通弦四十度為三百六十度九之一故以之除九邊之一即得三角形之腰線也八則圓體求積設圓體徑三十尺高四十尺求積法曰置徑自乘得九百尺再以高乘之得三萬六千尺用圓法十一乘十四除二卷四則得二萬八千二百八十五尺七寸有竒即所求解曰以徑自乘再以髙乘之方體積也方體與圓體等髙則兩體即若兩底之比例故用平圓法求圓體之積也九則撱圓體求積設撱圓體大徑三十六尺小徑一十六尺髙四十尺求積法曰置兩徑相乘得五百七十六尺再以高乘之得二萬三千零四十尺用圓法十一乘十四除得一萬八千一百零二尺八寸有竒即所求解同前則及二卷十六則十則弧矢體求積設弧矢體矢濶八尺六寸六分零二毫弦長三十尺背三十六尺二寸九分零三毫六絲高四十尺求積法曰置半弦自乘得二百二十五步以矢除之得二十五尺九寸八分零九一强為餘徑餘徑加矢折半得一十七尺三寸二分零五毫五絲為法乘背得六百二十八尺五寸六分九釐另以餘徑減矢折半得八尺六寸六分零四毫弱為法乘弦得二百五十九尺八寸一分二釐兩數相減餘三百六十八尺七寸五分七釐折半得一百八十四尺三寸七分八釐為底積再以高乘之得七千三百七十五尺一寸四分即所求二卷十七則十一則錐體求積設方錐方二十尺高四十尺求積法曰置二十尺自乘得四百尺為底積再以高乘之得一萬六千尺以錐法三歸之得五千三百三十三尺三寸三分有奇即所求解曰方邊自乘再以高乘之方體也方錐居方體三之一故三歸得積也何以知方錐居體三之一也試作立方如甲乙自心至各稜分之必成錐體六俱以方靣為底方邊之半為高更作一方體與錐體同底等高如丙丁丙丁方體既與錐體同底必亦與甲乙立方同底既與錐體等高必以甲乙方邊之半為高兩方體既同底則兩體之比例若高與高丙丁體必為甲乙立方二之一矣錐體既為甲乙立方六之一不為等高同底丙丁方體三之一乎再作直體廣二尺長四尺高八尺如癸辛亦自心至各稜分之亦成錐體六底等戊庚辛己高等辛子之半如丑者二底等癸壬庚戊高等庚辛之半如寅者二底等庚壬子辛高等辛己之半如卯者二六錐體形勢雖殊而俱等何也丑與寅同長丑之高倍于寅而寅之廣倍于丑折寅之廣凖丑之高則丑寅二體等矣又丑與卯同廣丑之長倍于卯而卯之高倍于丑折丑之長凖卯之高則丑卯二體亦等矣夫寅等于丑丑等于卯是六錐俱等矣今癸辛一直體能分為相等之六錐體則一錐體不為癸辛直體六之一乎錐體既為同底倍高直體六之一必為同底等高三之一無疑矣從此推之不論方圓多邊弧矢凡屬錐體者皆為同底等高體三之一十二則諸雜線體求積凡體先求底積底屬直線依一卷九則例屬曲線及雜線依二卷四十則例裁之得底積再以高乘之即得體積十三則渾圓求積設渾圓徑十尺求積法曰置徑自乘得一百尺四因之得四百尺十一乘十四除得三百一十四尺二寸八分六釐弱為靣積再以半徑乘之得一千五百七十一尺四寸三分弱以三歸之得五百二十三尺八寸一分即所求解曰置徑自乘再以十一乘十十四除者渾圓中丙子乙丑平圓積也以四因之者渾圓面積當平圓積四也何也渾圓面任割一分如甲丁己戊欲求面分之容則取自甲頂至戊界之度甲戊線為半徑作平圓如辛癸平圓辛壬與甲戊等其容即等若自乙丙平割渾圓之半取自甲頂至乙界之度為半徑作平圓其容必與渾圓半靣等今丙子乙丑平圓半徑為乙庚乙庚與甲庚等乙庚甲庚兩線偕甲乙線則成一勾股形甲乙為弦乙庚甲庚一為勾一為股也以弦為半徑之平圓必倍大于或勾或股為半徑之平圓渾圓半靣既等于以甲乙弦為半徑之平圓不倍大于以乙庚勾為半徑之丙子乙丑平圓乎半面既倍大于丙子乙丑平圓全靣不四倍大于丙子乙丑平圓乎法以半徑乘之以三歸之又何也平圓求積同于以圓周為底以半徑為高之三角形二卷四則故渾圓求積同于以全面為底以半徑為高之錐體以高乘底以三歸之者錐體求積之法也本卷十一則又嘗借西洋割圓八線表考之如前徑十尺之渾圓自頂中剖之再以乙丙線平分之依八線表例分乙丁甲曲線為九十度設任割球分為甲丁己戊其甲丁曲線三十度自丁戊向甲截作三十段梯形于八線表中求三十度通弦得五尺二十九度通弦得四尺八寸四分八釐一毫用梯形求積法一卷七則並兩數折半得四尺九寸二分四釐零五絲再求二十八度通弦得四尺六寸九分四釐七毫與二十九度通弦並而折半得四尺七寸七分一釐四毫依次折盡三十度共得通弦數七十六尺七寸五分九釐七毫五絲用圓徑求周法二卷一則求得二百四十一尺二寸四分五釐弱為球分面上三十段梯形兩濶折半之數為實復求甲丁曲線三十分之一得八分七釐三毫有竒取渾圓全周以三十六歸之即得為梯長乘實得割球靣積二十一尺零五分有奇叧求甲戊直線得二尺五寸八分八釐二毫即表中十五度通弦倍之得五尺一寸七分六釐四毫為徑求圓積亦得二十一尺零五分有竒與前數合又法置徑自乘再以徑乘之得一千尺以十一乘二十一除得數同解曰圓體與方體等高則兩體之比例若兩底之比例是方體與圓體若十四與十一也又圓體與渾圓等高令圓體之底同渾圓中心之平圓則圓體之容必等于以平圓為底以渾圓半徑為高渾圓半徑即固體高度之半也之錐體六本卷十一則渾圓之面既四倍于中心平圓而渾圓求積之法又同錐體則渾圓之容必等于以平圓為底半徑為高之錐體四夫以相等之錐體圓體得六而渾圓得四是圓體與渾圓若六之與四六之與四即三之與二也又以三因十四得四十二以二因十一得二十二各以二約之為二十一與十一則二十一與十一即等高立方渾圓之比例也法置徑自乘再乘立方也十一乘二十一除取立方二十一之十一為渾圓也十四則渾撱圓求積設渾撱圓大徑四十尺小徑二十尺求積法曰置小徑自乘得四百尺再以大徑乘之得一萬六千尺以十一乘二十一除得八千三百八十尺零九寸五分即所求解曰小徑自乘再以大徑乘之甲乙方體也方體渾撱圓比例亦猶立方與渾圓故十一乘二十一除得渾撱圓之積十五則鋭脊體求積設鋭脊體脊長十尺底長十四尺廣五尺高十二尺求積法曰倍底長加脊長得三十八尺以廣乘之得一百九十尺再以高乘之得二千二百八十尺以六歸之得三百八十尺即所求解曰依甲丙乙丁兩線分之成芻蕘一斜錐二斜錐與正錐同論芻蕘以高乘底積之半得積本卷四則錐以高乘底積三之一得積本卷十一則夫芻蕘之底長即鋭脊之脊長也若三倍脊長以六歸之即得芻蕘底長之半又兩斜錐之底長即鋭脊之脊長與底長之較也即戊庚己辛兩線並之度若二倍較線以六歸之即得斜錐底長三之一今倍底長加脊長非即三倍脊長二倍較線乎以六歸之以廣乘之再以高乘之得三分體之積即全體之積法先乘後歸亦異乘同除之意也十六則鱉臑求積設鱉臑上長二尺下長四尺高九尺求積法曰置兩長相乘得八尺再以高乘之得七十二尺以六歸之得一十二尺即所求解曰叧作一芻蕘如下圖芻蕘原為等高同底方體二之一本卷四則依甲丙乙丙兩線各從底稜分之成一錐體二鱉臑錐體原為等高同底方體三之一本卷十一則必為芻蕘三之二于芻蕘內減去錐體所餘三之一則兩鱉臑也兩鱉臑並既為芻蕘三之一必為與芻蕘等高同底方體六之一矣與芻蕘等高同底即為鱉臑等高倍底者也兩鱉臑既為等高倍底方體六之一則一鱉臑亦必為等高同底方體六之一故用六歸也十七則等廣鋭面體求積設等廣鋭靣體靣長四尺底長一十二尺底面俱廣五尺高一十二尺求積法曰並兩長折半得八尺以廣乘之得四十尺再以高乘之得四百八十尺即所求解曰依甲丙乙丁兩線分之成一直體二塹堵全靣即一直體底全底即一直體二塹堵底底靣並而折半則成一直體一塹堵底矣夫直體以高乘本底得積本卷二則塹堵以高乘半底得積本卷三則今一塹堵之全底即兩塹堵之半底也故以高乘底靣相並折半之數得全積十八則鋭靣方體求積設鋭靣方體靣方六尺底方八尺高一十二尺求積法曰置上方自乘得三十六尺下方自乘得六十四尺上下兩方相乘得四十八尺三數並共一百四十八尺以高乘之得一千七百七十六尺以三歸之得五百九十二尺即所求解曰各依面稜分之成方體一塹堵方錐各四凡九體而有三等三等求積之法則各殊方體以高乘底得積本卷二則塹堵以高乘底二之一得積本卷三則方錐以高乘底三之一得積本卷十一則若從方體則與塹堵不合從塹堵又與方錐不合不得不用三歸以就方錐然用三歸必三倍方體之底半倍塹堵之底而後可今下方自乘即甲乙方形得方體之底一塹堵方錐之底各四上方自乘即丙丁方形得方體之底一上下相乘即戊己直形得方體之底一塹堵之底二合三形共方體底三塹堵底六方錐底四夫方體底三三歸之仍得一塹堵底六三歸之得二二塹堵底即四塹堵底二之一也方錐底四三歸之各得三之一今以高乘一方體底四塹堵底二之一四方錐底三之一故得全積餘同本卷十五則十九則鋭靣直體求積設鋭靣直體靣長六尺廣五尺底長十尺廣八尺高一十二尺求積法曰倍上長加下長共二十二尺以上廣乘之得一百一十尺另倍下長加上長共二十六尺以下廣乘之得二百零八尺兩數並得三百一十八尺以高乘之得三千八百一十六尺以六歸之得六百三十六尺即所求解曰依各靣稜分之亦成九體與前則同但四塹堵兩兩相等辛戊與庚己等丙戊與丁己等四塹堵既不等則三歸之法不可用矣于是有六歸之法倍上長加下長以上廣乘之即戊己直形二丙丁直形一得戊己直體底三丙戊己丁塹堵底各一倍下長加上長以下廣乘之即甲乙直形二辛庚直形一得戊己直體底三辛戊庚己塹堵底各三丙戊丁己塹堵底各二甲戊等四錐底各二合之共直體底六塹堵底十二與辛戊等者六與丙戊等者六錐底八以六歸之得一直體底四塹堵底二之一四錐底三之一故以高乘之得全積按鋭靣直體亦有可用三歸者如後圖面長五尺廣三尺底長七尺廣四尺二寸高一十二尺用前法得積二百六十一尺六寸今以面廣乘靣長得一十五尺以底廣乘底長得二十九尺四寸以靣廣乘底長得二十一尺或以底廣乘靣長亦同三數並共六十五尺四寸以高乘之以三歸之得積同用此法求前體則不合其故何也蓋前體乃鋭脊之截體後體乃直錐之截體後體底靣長廣可互為比例若依四角斜線引而高之必成直錐是以謂之直錐之截體依前例分為九體其四塹堵雖體勢不同而容積皆等故用三歸而合也若前體底靣長廣不可為比例亦依四角斜線引而高之止成鋭脊終不成錐體是以謂之鋭脊之截體如前分為九體其四塹堵體勢既異而大小復殊故用三歸必不合也鋭靣直體有此二等不可不知也二十則鋭靣圓體求積設鋭靣圓體靣徑六尺底徑八尺高一十二尺求積法曰置靣徑自乘得三十六尺底徑自乘得六十四尺兩徑相乘得四十八尺三數並共一百四十八尺以高乘之得一千七百七十六尺再十一乘四十二除得四百六十五尺一寸四分有竒即所求解曰此與鋭靣方體法同元當用三歸得鋭靣方體積再十一乘十四除為本積今用十一乘四十二除者以三因十四得四十二以四十二除猶三歸又十四除也二十一則鋭面撱圓體求積設鋭面撱圓體面大徑四尺小徑二尺底大徑八尺小徑六尺高一十二尺求積法曰倍靣大徑加底大徑以靣小徑乘之得三十二尺另倍底大徑加靣大徑以底小徑乘之得一百二十尺兩數並共一百五十二尺以高乘之得一千八百二十四尺再以十一乘八十四除得二百三十八尺八寸五分有竒即所求解曰此與鋭靣直體法同元當用六歸得鋭靣直體積再十一乘十四除為本積今以八十四除者以六因十四得八十四以八十四除猶六歸又十四除也二十二則諸鋭靣體求積設鋭靣六邊體靣每邊廣一尺中長一尺七寸三分二釐所謂中長者乃邊與邊相對之度非角與角相對之度也底同底每邊廣二尺中長三尺四寸六分四釐高四尺求積法曰置高以底長折半乘之得六尺九寸二分八釐以兩長相減折半得八寸六分六釐除之得八尺為錐高另三因底邊二尺得六尺以底長之半乘之得十尺零三寸九分二釐以錐高八尺乘之三歸之得二十七尺七寸一分强為錐積另三因靣邊一尺得三尺以靣長之半乘之得二尺五寸九分八釐以原高減錐高餘四尺乘之三歸之得三尺四寸六分四釐為虛積以虛積減錐積餘二十四尺二寸四分八釐即所求解曰凡鋭靣體底靣長廣能為比例者皆諸錐之截體既得錐積復得體外虛積相減之餘即為所求之實積然欲求錐積必先求錐高錐高甲丙與元高甲丁之比例若底長之半甲乙與底靣兩半長之較線己乙也法以底長之半乘高以兩半長之較線除之者乃借乙己與己戊之比例己戊即甲丁因甲乙以求甲丙也凡鋭靣體俱同此法二十三則求錐體之正高設方錐底方十尺斜高一十三尺求正高法曰置斜高自乘得一百六十九尺另以底方折半自乘得二十五尺兩數相减餘一百四十四尺平方開之得一十二尺即所求解曰此勾弦求股法也六卷二則凡求諸錐體之積須得諸錐正高自傍面量者乃斜高非正高也自頂至底中心方為正高方錐係偶邊故折底長為勾如遇竒邊則求底中心至邊之度為勾本卷七則二十四則立方以積求邊一法即開立方設立方積三千三百七十五尺求方邊法曰置積于中為實先商十尺于左下法亦置十尺于右自乘再乘得一千尺除實餘二千三百七十五尺三因下法十尺得三十尺為方法次商五尺置于左初商十尺之次下法亦置五尺于初商十尺之次共一十五尺以次商五尺遍乘之得七十五尺為廉法再以方法乘廉法得二千二百五十尺除實餘一百二十五尺又置次商五尺自乘再乘得一百二十五尺為隅法除實恰盡合左初商次商得一十五尺即所求解曰初商自乘再乘大方積也次商五尺乘下法十尺得五十尺即方廉甲乙丙丁一側面之平積也丁乙五尺丁丙十尺相乘得五十尺以初商乘之必得一方廉之積每一方廉積五百尺若以方法三十尺乘之則得三方廉之積三方廉皆等又以次商五尺乘下法五尺得二十五尺即戊己庚辛長廉一方面之平積也戊己五尺戊庚亦五尺相乘得二十五尺以初商乘之必得一長亷之積每一長廉積二百五十尺若以方法三十尺乘之則得三長廉之積三長廉皆等今以次商五尺遍乘下法十五尺得七十五尺即方廉之側面長亷之方面兩平積也總以方法三十尺乘之即得三方廉三長廉之共積矣又次商五尺自乘再乘得一百二十五尺即隅方積以三方廉附于大方之三面以三長廉補方廉之缺又以一隅方補長廉之缺八體凑合則成一縱廣皆一十五尺之立方矣二十五則立方以積求邊二法設立方積三百六十五萬二千二百六十四尺求方邊法曰置積于中為實先商一百尺于左下法亦置一百尺于右自乘再乘得一百萬尺除實餘二百六十五萬二千二百六十四尺三因下法一百尺得三百尺為方法次商五十尺置于左初商一百尺之次下法亦置五十尺于初商一百尺之次共一百五十尺次商五十尺遍乘之得七千五百尺為廉法以方法乘廉法得二百二十五萬尺除實餘四十萬零二千二百六十四尺又以次商自乘再乘得一十二萬五千尺為隅法除實餘二十七萬七千二百六十四尺復三因下法一百五十尺得四百五十尺為方法三商四尺于左初商次商一百五十尺之次下法亦置四尺于初商次商一百五十尺之次共一百五十四尺以三商四尺遍乘之得六百一十六尺又為廉法以方法乘廉法得二十七萬七千二百尺除實餘六十四尺又以三商四尺自乘再乘得六十四尺為隅法除實恰盡合左初次三商共得一百五十四尺即所求解曰此與前則同但彼二位此三位耳設三商又不盡復三因初次三商為方法四商之倣此二十六則方體以積求邊一法即帶縱開立方設方體積二千九百二十五尺長廣相等高朒二尺求各度法曰置積于中為實初商十尺自乘又以朒二尺減十尺餘八尺乘之得尺百除實餘二千一百二十五尺倍八尺加初商十尺共二十六尺為方廉法又倍初商十尺加八尺共二十八尺為長廉法次商五尺置于初商之次以初商十尺乘方廉法得二百六十尺以次商五尺乘長廉法得一百四十尺兩數並共四百尺以次商五尺乘之得二千尺除實餘一百二十五尺又置次商五尺自乘再乘得一百二十五尺為隅法除實恰盡合初商次商共得一十五尺即底方之度減高朒二尺餘一十三尺即高度解曰初商自乘大方之底積又減二尺乘之高朒于縱及廣也倍八尺加十尺為方廉法者以方廉廣十尺者一廣八尺者二也又以十尺乘之者三方廉之長皆十尺也倍十尺加八尺為長廉法者以長廉長八尺者一長十尺者二也又以次商五尺乘之者三長廉之廣皆五尺也又並六廉以五尺乘之者六廉之厚皆五尺也餘同前則改設前積為三千二百四十三尺三寸七分五釐初商十尺次商五尺仍餘積三百一十八尺三寸七分五釐又以朒二尺減初次兩商十五尺餘十三尺倍之加十五尺共四十一尺為方廉法倍十五尺加十三尺共四十三尺為長廉法三商五寸于初次兩商一十五尺之次以初次兩商十五尺乘方廉法得六百一十五尺以三商五寸乘長廉法得二十一尺五寸並兩數共六百三十六尺五寸又以三商五寸乘之得三百一十八尺二寸五分除實餘一寸二分五釐升二位作一百二十五寸又置三商五寸自乘再乘得一百二十五寸除實恰盡合初次三商得一十五尺五寸為底方之度减高朒二尺餘一十三尺五寸為高度餘積一寸二分五釐升二位何也蓋體以縱廣及高各一尺為積一尺一尺實積千寸取十分尺之一為寸是一寸而實積百寸也故寸以下皆升二位二十七則方體以積求邊二法設方體積四千二百七十五尺長廣相等高多四尺求各度法曰置積于中為實初商十尺自乘又以多四尺並十尺共十四尺乘之得一千四百尺除實餘二千八百七十五尺倍十四尺加初商十尺共三十八尺為方廉法倍初商十尺加十四尺共三十四尺為長廉法次商五尺置于初商之次以初商十尺乘方廉法得三百八十尺以次商五尺乘長廉法得一百七十尺兩數並共五百五十尺又以次商五尺乘之得二千七百五十尺除實餘一百二十五尺又置次商五尺自乘再乘得一百二十五尺為隅法除實恰盡合初次兩商共得一十五尺即底方之度加高多四尺共一十九尺即高度解同前二十八則直體以積求邊一法設直體積七千二百尺高一十二尺廣朒于長十尺求長廣法曰置積以高除之得六百尺四因之得二千四百尺叧置廣朒于長十尺自乘得一百尺兩數並平方開之得五十尺減廣朒于長十尺餘四十尺折半得二十尺即廣加十尺得三十尺即長解曰以高除積所得者直體底積也故平方帶縱開之即得所求也二十九則直體以積求邊二法設直體積三千一百三十五尺高多長四尺長多廣四尺求各度法曰置積于中為實初商十尺以十尺減長多廣四尺餘六尺乘之又以十尺加高多長四尺共十四尺乘之得八百四十尺除實餘二千二百九十五尺列十尺六尺十四尺為方廉法並十尺六尺十四尺共三十尺為長廉法次商五尺置于初商之次方廉法維乘以六尺乘十尺得六十尺十尺乘十四尺得一百四十尺十四尺乘六尺得八十四尺並之共二百八十四尺又以次商五尺乘長廉法得一百五十尺兩數並共四百二十四尺再以次商五尺乘之得二千一百七十尺除實餘一百二十五尺又置次商五尺自乘再乘得一百十五尺為隅法除實恰盡合初次兩商共一十五尺即長增四尺共一十九尺即高減長四尺餘一十一尺即廣解曰初商十尺為大方之長減四尺餘六尺為廣增四尺共一十四尺為高故兩乘得大方積大方三面之平積即三方廉之底積也而大方之三面各不等以廣六尺乘長十尺得甲乙丙丁面平積以長十尺乘高一十四尺得戊己甲乙面平積以高一十四尺乘廣六尺得已庚乙丁面平積故列三位為方廉法維乘也又大方三稜之度即三長廉之高也而大方三稜亦不等甲乙稜十尺乙丁稜六尺乙己稜一十四尺故並三數為長廉法也餘同前解三十則渾圓以積求徑設渾圓積一千七百六十七尺八分五釐七毫有竒求圓徑法曰置積二十一乘十一除得三千三百七十五尺立方開之得一十五尺即所求解曰十一與二十一渾圓立方之比例也本卷十三則二十一乘十一除令渾圓化為相當之立方故立方開之得方邊即得圓徑也三十一則渾撱圓以積求徑設渾撱圓積二千二百三十九尺二寸八分五釐有竒大徑多小徑四尺求兩徑法曰置積二十一乘十一除得四千二百七十五尺以帶縱立方開之得一十五尺即小徑加多四尺得一十九尺即大徑解曰渾㨊圓與方體之比例亦若渾圓與立方故二十一乘十一除帶縱立方開之得方體之廣及高即渾撱圓之兩徑也三十二則三乘還原即開三乘方設三乘積六百二十五尺求還原法曰置積為實平方開之得二十五尺再以平方開之得五尺即所求解曰以五自乘再乘三乘得六百二十五即所謂三乘方也反求元數即所謂開三乘方也三乘原無形體可言但法類于開平方立方故亦謂之方耳從此推之一次平方一次立方可開五乘方三次平方可開七乘方三十三則委粟求積設委粟底周八十八尺高八尺八寸求積法曰置周自乘得七千七百四十四尺以高乘之得六萬八千一百四十七尺二寸再七乘二百六十四除得一千八百零六尺九寸三分有竒即所求解曰此即圓錐也圓形與周上方形之比例若七與八十八二卷五則凡兩體等高者體與體之比例若底與底圓體與周上等高方體之比例必亦若七與八十八今圓錐居圓體三之一以三乘八十八得二百六十四則是圓錐與周上等高方體之比例必若七與二百六十四矣二十四則倚壁委粟求積設倚壁委粟周四十四尺高八尺八寸求積法曰置周自乘得一千九百三十六尺以高乘之得一萬七千零三十六尺八寸再七乘一百三十二除得九百零三尺四寸六分有竒即所求解曰此圓錐之半也半錐居全錐二之一半周上方體與圓錐等高下同居全周上方體四之一故其比例為七與一百三十二也三十五則倚外角委粟求積設倚外角委粟周六十六尺高八尺八寸求積法曰置周自乘得四千三百五十六尺以高乘之得三萬八千三百三十二尺八寸再七乘一百九十八除得一千三百五十五尺二寸即所求解曰此圓錐四之三也與全周上方體與圓錐等高下同之
