body:
  text: 數學鑰卷一凡例柘城杜知耕撰凡例計十四則一則數非圖不明圖非手指不明圖用甲乙等字作誌者代指也作誌必用甲乙等字者取其筆畫省而不亂正文也甲乙等字盡則用子丑等字又盡則用乾坤等字如云甲乙丙丁方形則指第一圖戊巳庚辛方形則指第二圖或錯舉二字謂第一圖為甲丁或乙丙形謂第二圖為戊辛或巳庚形又指第一圖左下角曰甲角右下角曰乙角又或有兩角相連如第三圖兩形相同一角如第四圖舉一字不能别為某形某角則連用三字曰寅癸丑角或壬癸子角以中一字為所指之角二則四邊皆等四角中矩者曰方形如第一圖四角中矩四邊兩兩相等者曰直形如第二圖或四邊等或兩邊等而四角俱不中矩者曰象目形如第三圖四邊俱不等兩角中矩兩角不中矩者曰斜方形如第四圖角不中矩兩邊相等者曰梯形如第五圖邊及角俱不等者曰無法形如第六圖三邊形有一方角者甲為方角曰勾股形如第七圖無方角者曰三角形如第八圖三則形邊之界曰線線之縱者曰長或曰高衡者曰濶或曰廣在下者或曰底斜對兩角者曰弦四則形之積步積尺曰積曰容方形之容或曰羃五則線之作誌處曰㸃六則兩線相並曰和七則以此線比彼線彼線之大于此線者以此形比彼形彼形之大于此形者或曰較或曰差如甲丙線之大于甲乙線為丙乙則丙乙為兩線之較線或曰兩線之差丁己形之大于丁戊形為庚己形則庚己為兩形之較形或曰兩形之差八則甲乙線上作甲丙方形各邊俱等于甲乙曰甲乙線上方形其形之容即甲乙自乘之數丁戊衡線戊己縱線内作丁己直形己庚與丁戊等庚丁與戊己等曰丁戊偕戊己兩線矩内形其形之容即丁戊戊己相乘之數九則甲乙衡線上作丙丁縱線而丙丁乙與丙丁甲兩角俱方角則丙丁為甲乙線上之垂線十則兩直線引至無窮不相離亦不相遇曰平行線平行線内任作幾形皆等高如甲乙丙丁兩線平行兩線内作戊己庚三角形與辛壬直形兩形之高必相等凡兩形等高者則曰同在平行線内十一則甲乙丙三形並為一形形曲如磬曰甲乙丙磬折形十二則方形並舉四邊曰方周十三則方形或圓形外實中虚曰環其中虚處曰虚形或曰缺形十四則甲乙形以丙丁線分之成甲丁丙乙兩形或再以戊己線分之成甲庚丙己戊丁庚乙四形謂甲丁等二形或甲庚等四形曰分形謂甲乙元形曰全形數學鑰巻一凡例欽定四庫全書數學鑰巻一目録柘城杜知耕撰方田上直線類一則實積求畝二則直形求積三則方形求積四則勾股求積二法五則三角形求積六則斜方形求積七則梯形求積西法八則象目形求積二法九則諸直線形求積十則積求方邊即開平方二法十一則方邊求斜弦十二則斜弦求方邊十三則直積求長與濶即帶縱開平方十四則直形以長求濶十五則直形以濶求長十六則直形長濶求弦十七則直形濶弦求長十八則直形長弦求濶十九則直形長及弦濶差求濶二十則直形濶及弦長差求長二十一則直形弦及長濶和求長濶差二十二則直形長及弦濶和求濶二十三則直形濶及弦長和求長二十四則直形弦及長濶差求長與濶二十五則直形長弦和及濶弦和求長與濶二十六則直形長弦差及濶弦差求長與濶二十七則直形積及長濶和求長濶差二十八則直形積及長濶和求弦二十九則兩邊等之三角形求對角之垂線増三十則有一方角之三角形求對角之垂線増三十一則不等邊而無方角之三角形求對角之垂線三十二則方周求積三十三則方環以周求積増三十四則方環以積及濶求邊三十五則直形依長截濶三十六則直形依濶截長三十七則直形截勾股三十八則直形截三角三十九則直形截斜方四十則直形截梯形四十一則三角形以截積截濶求截長勾股截積同四十二則三角形以截積截長求截濶四十三則三角形以截長求截濶四十四則三角形以截濶求截長四十五則三角形以截積求截長四十六則三角形以截積求截濶四十七則斜方形以截積截長求截濶梯形截積同四十八則斜方形以截積截濶求截長四十九則斜方形以截濶求截長五十則斜方形以截長求截濶五十一則斜方形依小邊截積求截濶五十二則斜方形依大邊截積求截濶五十三則梯形截勾股五十四則梯形截斜方五十五則梯形截無法五邊形増五十六則方環截外周増五十七則方環截内周數學鑰巻一目録欽定四庫全書數學鑰巻一柘城杜知耕撰方田上直線類一則實積求畝設田積二萬九千五百二十步求畝法曰置積為實以畝法二四除之得一百二十三畝即所求解曰五尺為步二百四十步為畝如自甲至乙濶一步即五尺餘三邊各與甲乙等則甲丙方形為積一步二百四十倍之則為一畝故畝法用二四也本巻及二巻皆言求積之法得積以此法求之即得畝數二則直形求積設直田長十步濶八步求積法曰置長為實以濶乘之得八十步即所求解曰直田長濶不等求積之法任取一邊為此一邊之倍數或以濶乘長或以長乘濶如甲戊形之戊乙己甲各二步則二倍甲乙邊八步之數而甲戊形得積一十六步今丙乙丁甲各十步是十倍甲乙邊八步之數故得積八十步也三則方形求積設方田方八步求積法曰置八步自乘得六十四步即所求解曰方田四邊皆等以此邊為此邊之倍數與以他邊為此邊之倍數同故法用自乘也四則勾股求積設勾股田股長十二步勾濶八步求積法曰置股為實以勾乘之得九十六步折半得四十八步即所求解曰勾股形當等高等濶直形之半如甲乙丙勾股形另作丁己直形與之等高謂丁庚與甲丙等等濶謂丁戊與甲乙等以庚戊線分之則成丁戊庚庚己戊兩勾股形皆與甲乙丙勾股形等夫丁己一直形當甲乙丙勾股形二而甲乙丙勾股形不當丁己直形之半乎法以勾乘股所得者丁己直形積也故半之得勾股積又法置股為實以半勾四步乘之所得同前半股為實以勾乘之亦得解曰丁己直形再以壬辛線中分之成丁壬辛己兩分形法以半勾乘股所得即分形積也勾股既為丁己直形之半而分形亦為丁己直形之半故分形積即勾股積也五則三角形求積設三角田中長一十二步底濶八步求積法同勾股田解曰甲乙丙三角形依底線作甲丁直形從角以丙己線分之則三角形内成甲己丙乙己丙兩勾股形直形内成甲丙己丁兩分形從前解推之甲己丙勾股形當甲丙分形之半乙己丙勾股形當己丁直形之半兩勾股形既當兩分形之半而三角全形不為甲丁全形之半乎故求積之法與勾股同也或兩邊等如第一圖或三邊等如第二圖或三邊俱不等如第三圖法皆同六則斜方形求積設斜方田長一十五步上濶六步下濶十步求積法曰置長為實以兩濶相並共一十六步折半得八步為法乘之得一百二十步即所求解曰甲乙丁庚斜方形減去辛丁直形所餘必甲庚辛勾股形勾股形既為等高等濶直形之半本巻四則則己庚直形必與甲庚辛勾股形等又己庚直形與辛丁直形並亦必與甲庚辛勾股形與辛丁直形並等法並兩濶折半者乙己之度也以乙己乘丁乙所得乃己丁直形也而己丁直形即己庚辛丁兩形並也安得不與甲乙丁庚斜方形等乎七則梯形求積設梯田長一十五步上濶六步下濶十步求積法同斜方田解曰甲乙丙丁梯形減去戊丁直形餘甲丙戊乙丁己兩勾股形必與辛丙己庚兩分形等今戊丁直形與兩分形並則與全梯形等矣故並兩濶折半乘長得積也八則象目形求積設象目田濶八步正長一十二步求積法曰置正長為實以濶乘之得九十六步即所求解曰幾何原本云甲乙丙丁象目形甲戊為正長自乙作乙己線與甲戊平行次于丁丙線引長之至戊成甲乙己戊甲乙丁丙兩形在平行線内等高即在平行線内而同底等濶即同底則兩形必相等何也甲戊乙己兩線既平行則戊己必與甲乙等而丙丁元等于甲乙則丙丁與戊己必亦等丙丁既與甲乙等則甲丙乙丁兩線必平行而亦相等因顯甲丙戊乙丁己兩三角形亦等于兩形内每減一己丙庚三角形所餘甲庚己戊庚乙丙丁兩無法四邊形亦等次于兩無法形每加一甲庚乙三角形則成甲乙丙丁甲乙戊己兩形安得不等法以濶乘正長得甲己直形之積即甲乙丙丁象目形之積又法甲乙丙丁象目田自甲量至丁得一十六步自丙量至戊得六步兩數相乘亦得九十六步與前同解曰象目田以甲丁線分之則成相等之兩三角形甲丁即底丙戊即中長也故以底乘長得全積也三角法以底乘長折半得積今不折故得兩形之共積九則諸直線形求積第一圖可作三三角形第二圖可作一斜方形一三角形第三圖可作一三角形而減一小三角形第四圖可作一方形而減一勾股形第五圖可作一直形一勾股形第六圖可作兩三角形其餘千形萬狀凡屬直線邊者皆依方直三角勾股裁之十則積求方邊即開平方設方田積三萬六千一百步求方邊法曰置積于中為實初商一百步于實左亦置一百步于實右為方法左右對呼除實一萬步餘二萬六千一百步倍方法得二百步為亷法次商九十步于左初商之次共一百九十步亦置九十步于右亷法之次為隅法共二百九十步以左次商與亷法對呼除實一萬八千步餘八千一百步又以左次商與隅法對呼除實八千一百步恰盡于左得一百九十步即所求方邊之數解曰初商與方法對呼所除者己辛方形也即大方積次商與亷法對呼所除者甲壬壬丁兩直形也即兩亷必倍方法為亷法者以亷有二也次商與隅法對呼所除者庚戊方形也即隅方四形恰盡實積則初次兩商之數為方田邊無疑矣又設方田積七萬一千八百二十四步求方邊法曰置積于中為實初商二百步于左亦置二百步于右為方法左右對呼除實四萬步餘三萬一千八百二十四步倍方法得四百步為亷法次商六十步于左初商之次亦置六十步于亷法之次為隅法先以次商與亷法對呼除實二萬四千步再以次商與隅法對呼除實三千六百步餘實四千二百二十四步又倍次商得一百二十步並右亷法共五百二十步復為亷法三商八步于左初商次商之次共二百六十八步亦置八步于右亷法之次復為隅法先以三商與亷法對呼除實四千一百六十步再以三商與隅法對呼除實六十四步恰盡于左初次三三商共得二百六十八步即所求方邊之數解曰此與前條無異但前二位此三位耳初商次商不能盡故三商之如三商又不盡則四商五商倣此十一則方邊求斜弦設方田方五十步求弦法曰置方數自乘得二千五百步倍之得五千步平方開之本巻十則得七十步零七分有竒即所求解曰甲乙丙丁方形作甲丁丙乙弦線次作己庚辛壬方形令方邊與甲丁方形之弦線等則庚壬方形必倍大于甲丁方形何也甲丁形内丁戊丙丙戊甲甲戊乙乙戊丁三角形四是四三角形當一甲丁方形也形外丁丙己乙丁壬甲乙辛丙甲庚三角形亦四各與甲丁形内四三角形等是形外四三角形又當一甲丁方形矣因知斜弦自乘之方形即庚壬方形倍大于方邊自乘之方形即甲丁方形法置方邊自乘即甲丁方積也倍之即庚壬方積也平方開之得庚壬方形之邊即得甲丁方形之弦也十二則斜弦求方邊設方田弦長七十步零七分有竒求方邊法曰置弦自乘得五千步折半得二千五百步平方開之得五十步即所求解曰置弦自乘求庚壬方積也圖同上則折半即甲丁方積也故平方開之得甲乙十三則直積求長與濶即帶縱開平方設直田積九百七十二步長濶差九步求長與濶法曰置積四因之得三千八百八十八步又長濶差自乘得八十一步兩數並共三千九百六十九步平方開之得六十三步加長濶差共七十二步折半得三十六步即長以長濶差減長餘二十七步即濶解曰一線任兩分之兩分線矩内形四及兩分線之較線上方形一並與元線上方形等如圖甲乙線兩分于丙丙子庚癸己壬辛丑四線各與乙丙等庚子己癸辛壬丙丑四線各與甲丙等則丙庚庚己己辛辛丙四形必兩分線矩内形也辛丑既等于丙乙壬辛又等于甲丙則丑壬必兩分線之較線壬癸癸子子丑又各等于丑壬則癸丑形必較線上方形矣甲乙元線上方形不與五形並等乎直田積即兩分線矩内形也四因之者矩内形四也長濶差自乘即較線上方形也五形並等于元線上方形故平方開之得甲乙元線即長濶相和之度也開方所得之六十三步長濶和增一長濶差即兩長兩長折半非一長而何以長濶差減長非濶而何十四則直形以長求濶設直田積九百七十二步長三十六步求濶法曰置積為實以長除之得二十七步即所求解曰濶為長之倍數故以長除積得濶本巻二則十五則直形以濶求長設直田積九百七十二步濶二十七步求長法曰置積為實以濶除之得三十六步即所求解曰長亦為濶之倍數故以濶除實得長本巻二則十六則直形長濶求弦設直田濶二十七步長三十六步求弦法曰長濶各自乘長得一千二百九十六步濶得七百二十九步兩數並共二千零二十五步平方開之得四十五步即所求解曰此即勾股求弦六巻一則十七則直形濶弦求長設直田濶二十七步弦四十五步求長法曰弦濶各自乘弦得二千零二十五步濶得七百二十九步兩數相減餘一千二百九十六平方開之得三十六步即所求解曰此即勾弦求股六巻二則十八則直形長弦求濶設直田長三十六步弦四十五步求濶法曰弦長各自乘弦得二千零二十五步長得一千二百九十六步兩數相減餘七百二十九步平方開之得二十七步即所求解曰此即股弦求勾六巻三則十九則直形長及弦濶差求濶設直田長三十六步弦濶差一十八步求濶法曰長與弦濶差各自乘長得一千二百九十六步弦濶差得三百二十四步兩數相減餘九百七十二步折半得四百八十六步以弦濶差為法除之得二十七步即所求解曰此即股與勾弦較求勾六巻十四則二十則直形濶及弦長差求長設直田濶二十七步弦長差九步求長法曰置濶自乘得七百二十九步以弦長差為法除之得八十一步減弦長差餘七十二步折半得三十六步即所求解曰此即勾與股弦較求股六巻十五則二十一則直形弦及長濶和求長濶差設直田長濶和六十三步弦四十五步求長濶差法曰置弦自乘得二千零二十五步倍之得四千零五十步另置長濶和自乘得三千九百六十九步兩數相減餘八十一步平方開之得九步即長濶差以減長濶和餘五十四步折半得二十七步即濶加長濶差得三十六步即長解曰此即弦與勾股和求勾股較六巻七則二十二則直形長及弦濶和求濶設直田弦濶和七十二步長三十六步求濶法曰置長自乘得一千二百九十六步以弦濶和為法除之得一十八步即弦濶差以減弦濶和餘五十四步折半得二十七步即所求解曰此即股與勾弦和求勾弦較六巻十八則二十三則直形濶及弦長和求長設直田弦長和八十一步濶二十七步求長法曰置濶自乘得七百二十九步以弦長和為法除之得九步即弦長差以減弦長和餘七十二步折半得三十六步即所求解曰此即勾與股弦和求股弦較六巻十九則二十四則直形弦及長濶差求長與濶設直田長濶差九步弦四十五步求長與濶法曰置弦自乘得二千零二十五步倍之得四千零五十步另置長濶差自乘得八十一步兩數相減餘三千九百六十九步平方開之得六十三步即長濶和加長濶差共七十二步折半得三十六步即長減長濶差餘二十七步即濶解曰此即弦與勾股較求勾股和六巻十則二十五則直形長弦和及濶弦和求長與濶設直田長弦和八十一步濶弦和七十二步求長與濶法曰置長弦和以濶弦和乘之得五千八百三十二步倍之得一萬一千六百六十四步平方開之得一百零八步與長弦和相減餘二十七步即濶與濶弦和相減餘三十六步即長解曰此即勾弦和股弦和求勾與股六巻十三則二十六則直形長弦差及濶弦差求長與濶設直田長弦差九步濶弦差一十八步求長與濶法曰置長弦差以濶弦差乘之得一百六十二步倍之得三百二十四步平方開之得一十八步加濶弦差得三十六步即長加長弦差得二十七步即濶解曰此勾弦較股弦較求勾與股六巻二十則二十七則直形積及長濶和求長濶差設直田長濶和六十三步積九百七十二步求長濶差法曰置長濶和自乘得三千九百六十九步另置積四因之得三千八百八十八步兩數相減餘八十一步平方開之得九步即所求解曰長濶和自乘之方積當直田積四長濶差自乘之方積一故以長濶和自乘減去四直田積餘以平方開之得長濶差也本巻十三則二十八則直形積及長濶和求弦設直田積九百七十二步長濶和六十三步求弦法曰置長濶和自乘得三千九百六十九步另置積倍之得一千九百四十四步兩數相減餘二千零二十五步平方開之得四十五步即所求解曰甲戊形長濶和自乘之方也庚辛形弦自乘之方也甲戊形内勾股八及長濶差自乘之方一庚辛形内勾股四及長濶差自乘之方一每二勾股當一直形如一丙乙丑辛直形内有乙丙辛丑辛丙兩勾股形是長濶和上方形大于弦上方形之較為二直田積也故法以長濶和自乘減去二直田積平方開之即得弦度也二十九則兩邊等之三角形求對角之垂線設三角田底濶六步兩餘邊各五步求中長法曰置底折半得三自步乘得九步餘邊亦自乘得二十五步兩數相減餘一十六步平方開之得四步即所求解曰丙乙作弦乙丁作勾以所求之丙丁作股此即勾弦求股法也六巻二則甲乙邊折半即得勾者以乙丙丙甲兩邊等也設兩邊不等此法不行矣則有下法在三十則有一方角之三角形求對角之垂線設不等邊三角田有一方角丙為方角即勾股田底濶十步乙丙邊六步甲丙邊八步求中長法曰置乙丙邊自乘得三十六步以底除之得三步六分此即丁乙之度以下仍勾弦求股法又自乘得一十二步九分六釐與丙乙邊自乘之數相減餘二十三步零四釐平方開之得四步八分即所求解曰此勾股求對角垂線法也六巻二十五則因有方角故用之若無方角此法又窮矣更有一法不問等邊方角與否皆可求如下則三十一則不等邊而無方角之三角形求對角之垂線設三角田底濶一十五步乙丙邊八步甲丙邊十步求中長法曰置乙丙甲丙兩邊各自乘乙丙得六十四步甲丙得一百步兩數相減餘三十六步為實以底除之得二步四分以減底餘一十二步六分折半得六步三分即乙丁之度以下勾弦求股法又自乘得三十九步六分九釐另置乙丙自乘得六十四步兩數相減餘二十四步三分一釐平方開之得四步九分三釐有竒即所求解曰甲乙丙三角形丁為對角㸃另作庚辛為乙丙邊上方壬癸為甲丙邊上方壬癸大于庚辛之較為夘子丑磬折形若移丑于寅則成夘子寅直形又作辰巳為丁乙上方午未為甲丁上方午未大于辰巳之較為申酉戌磬折形若移戌于亥則成申酉亥直形申酉亥與夘子寅兩直形必相等何也甲乙丙三角形以丙丁線分之則成丁乙丙丁甲丙兩勾股形既皆勾股形則丙乙弦上方形必與丙丁股乙丁勾上兩方形並等甲丙弦上方形必與丙丁股甲丁勾上兩方形並等六巻一則從此推之則甲丙上方形大于丙乙上方形之容必與丙丁甲丁上兩方形大于丙丁乙丁上兩方形之容等試減去同用之丙丁上方形則甲丙上方形大于乙丙上方形之夘子寅直形與甲丁上方形大于乙丁上方形之申酉亥直形必相等矣法以乙丙甲丙上兩方形相減餘即夘子寅直形之容亦即申酉亥直形之容也夫申酉亥直形以甲乙底為長以甲丁乙丁兩線並為長即以甲乙全線為長以甲丁乙丁之較線甲己為濶者也故以甲乙底除之得甲己甲己既為甲丁乙丁之較線于甲乙線減去甲己則己丁乙丁兩線等矣故折半得乙丁餘仍勾弦求股法六巻二則同前則三十二則方周求積設方田周二百步求積法曰置周自乘得四萬步以方法十六除之得二千五百步即所求解曰假如一步以四面計之則周四步四步自乘得一十六步是周自乘之十六步止得實積一步故以十六為方法也然此法止可施于方田至于直田則不可用如下圖直田長六十步濶四十步周亦得二百步實積止得二千四百步如以前法求之則多積百步矣三十三則方環以周求積設方環田外周二百八十步内周一百二十步求積法曰二周各自乘外周得七萬八千四百步内周得一萬四千四百步兩數相減餘六萬四千步以方法十六除之得四千步即所求解曰此方内減方法也如知環濶則用梯田法置兩周相並折半以濶乘之即得環積三十四則方環以積及濶求邊設方環田積四千步濶二十步求内外邊法曰置濶自乘得四百步以四因之得一千六百步以減環積餘二千四百步餘積以四歸之得六百步以濶除之得三十步即内邊倍濶得四十步加之得七十步即外邊解曰法以環濶自乘者求環之隅方也即甲等以四因之者環之隅有四也即甲乙丙丁四方形以減環積所餘必四直形也即戊己庚辛四直形四歸之者取四直形之一也以濶除之即得内邊者其直形以環之濶為濶以内邊之度為長也加兩濶即得外邊者外邊大于内邊之較為兩濶也或四因環濶除積得五十步即直方兩形並之共長加濶得外邊減濶得内邊三十五則直形依長截濶設直田長八十五步依元長截積二千七百二十步求截濶法曰置積為實以元長除之得三十二步即所求解曰即以長求濶法本巻十四則三十六則直形依濶截長設直田濶六十四步依元濶截積二千七百二十步求截長法曰置積為實以元濶除之得四十二步五分即所求解曰即以濶求長法本巻十五則三十七則直形截勾股設直田長八十五步依元長截積一千三百六十步成勾股形法曰置積倍之得二千七百二十步以元長除之得三十二步即所求解曰勾股形當等高等濶直形之半法倍勾股積即乙丙直形積也乙丙直形既倍勾股積則必與勾股等高等濶矣故求乙丙直形之濶即勾股之濶也三十八則直形截三角設直田濶六十四步依元濶截積一千三百六十步成三角形求長法曰置積倍之得二千七百二十步以元濶除之得四十二步五分即所求解曰三角形亦當等高等濶直形之半法倍三角積即甲乙直形積也甲乙直形既倍三角積則必與三角形等高等濶矣故求甲乙直形之長即三角形之長也三十九則直形截斜方設直田長八十五步依元長截積二千七百二十步成斜方形兩濶相差五步求兩濶法曰置積為實以元長除之得三十二步另置相差五步折半得二步五分並三十二步得三十四步五分即大邊減三十二步得二十九步五分即小邊解曰以元長除積者求甲乙直形之濶也甲乙直形之濶為斜方兩濶之中度謂小于大邊二步五分大于小邊亦二步五分故置差折半增減之即得兩濶四十則直形截梯形設直田濶六十步依元濶截積三千七百八十步成梯形兩濶相差一十二步求長法曰置積為實倍元濶得一百二十步減相差一十二步餘一百零八步折半得五十四步為法除之得七十步即所求解曰倍濶減差折半者求甲乙直形之濶也甲乙直形濶為梯形兩邊之中度謂小于大邊六步大于小邊亦六步則直形之容必與梯形等故求直形之長即得梯形之長四十一則三角形以截積截濶求截長勾股截積同設三角田依角截積一千三百六十步截濶六十四步求截長法曰置積倍之得二千七百二十步以濶除之得四十二步五分即所求解曰此與直田截三角同本巻三十八則四十二則三角形以截積截長求截濶設三角田依角截積一千三百六十步截長四十二步五分求截濶法曰置積倍之得二千七百二十步以長除之得六十四步即所求解曰此與直田截勾股同本巻三十七則四十三則三角形以截長求截濶設三角田元長二百步濶一百五十步自角截長一百五十步求截濶法曰置截長為實以元濶乘之得二萬二千五百步以元長除之得一百一十二步五分即所求解曰凡三角形任以一線分之分線若與底線平行則分形之比例必各與全形等謂丙丁與丁戊若丙甲與甲乙丁戊與丙庚若甲乙與丙己又丁戊與甲乙若丙丁與甲丙丙庚與丙己也泰西幾何原本甲乙丙即元形丁戊丙即截形也則截長與截濶之比例必若元長與元濶矣截濶與元濶之比例亦必若截長與元長矣謂截長大于截濶幾分之幾則元長亦大于元濶幾分之幾截濶小于元濶幾分之幾則截長亦小于元長幾分之幾法以元濶乘截長以元長除之者借元長及元濶之比例因截長以求截濶也求比例用異乘同除法詳三巻五則四十四則三角形以截濶求截長設三角田元長二百步濶一百五十步截濶一百一十二步五分求截長法曰置截濶為實以元長乘之得二萬二千五百步以元濶除之得一百五十步即所求解曰此借元濶元長之比例因截濶以求截長也四十五則三角形以截積求截長設三角田元長二百步濶一百五十步自角截積八千四百三十七步五分求截長法曰置積倍之得一萬六千八百七十五步為實以元長乘之得三百三十七萬五千步以元濶除之得二萬二千五百步平方開之得一百五十步即所求解曰甲乙丙即元形丁戊丙即截形丁壬為截形等高等濶之直形辛壬為截長丙庚線上方形丁壬辛壬兩形之高必相等兩形既等高則其比例必若丁戊與辛戊幾何原本云凡兩形等高形與形之比例若線與線辛戊與截長丙庚等而丁戊即截濶是丁壬與辛壬之比例若截濶與截長也分形之比例元與全形等本巻四十三則則丁壬與辛壬之比例又若元濶與元長矣法倍截積者求丁壬直形也以元長乘元濶除之者借元長元濶之比例因丁壬直形以求辛壬方形也辛壬為截長丙庚上方形故平方開之得截長也四十六則三角形以截積求截濶設三角田元長二百步濶一百五十步自角截積八千四百三十七步五分求截濶法曰置截積倍之得一萬六千八百七十五步為實以元濶乘之得二百五十三萬一千二百五十步以元長除之得一萬二千六百五十六步二分五釐平方開之得一百一十二步五分即所求解曰甲乙丙即元形丁戊丙即截形丁壬為截形等高等濶之直形丁辛為截濶丁戊上方形丁壬丁辛兩形之濶必相等兩形既等濶則其比例必若戊壬與戊辛戊辛與截濶等戊壬與截長等是丁壬與丁辛之比例若截長與截濶亦若元長與元濶矣法倍截積者求丁壬直形也以元濶乘元長除之者借元長元濶之比例因丁壬直形以求丁辛方形也丁辛為截濶丁戊上方形故平方開之得截濶也以上皆自角截積法若自底截積則以截積減元積餘積亦以上法求之得濶即截濶得長減元長餘為截長四十七則斜方形以截積截長求截濶梯形截積同設斜方田元長九十步大邊濶三十八步小邊濶二十步依小邊截積八百二十二步五分截長三十五步求截濶法曰置積為實以截長除之得二十三步五分倍之得四十七步減小邊元濶餘二十七步即所求解曰以截長除積者求甲丙直形之濶甲乙也甲乙為小邊及截濶之中度倍之則與小邊及截濶並等矣故減小邊即得截濶也四十八則斜方形以截積截濶求截長設斜方田元長九十步大邊濶三十八步小邊濶二十步依小邊截積八百二十二步五分截濶二十七步求截長法曰置積為實以截濶與小邊元濶並得四十七步折半得二十三步五分為法除之得三十五步即所求解曰以截濶與小邊相並折半者求兩濶之中度甲乙也同前圖故以除積得截長四十九則斜方形以截濶求截長設斜方田元長九十步大邊濶三十八步小邊濶二十步截濶二十七步求截長法曰置小邊元濶與截濶相減餘七步為實以元長乘之得六百三十步另以兩元濶相減餘一十八步除之得三十五步即所求解曰小邊與截濶相減所餘必庚己兩元濶相減所餘必甲戊庚己與截長之比例若甲戊與元長也與三角形同本巻四十三則五十則斜方形以截長求截濶設斜方田元長九十步大邊濶三十八步小邊濶二十步自小邊截長三十五步求截濶法曰置截長為實以兩元濶相減餘一十八步乘之得六百三十步以元長除之得七步並小邊元濶得二十七步即所求解曰七步即己庚之度也圖同前故加小邊元濶得截濶餘同前解五十一則斜方形依小邊截積求截濶設斜方田元長九十步大邊濶三十八步小邊濶二十步自小邊截積八百二十二步五分求截濶法曰置積為實以兩元濶相減餘一十八步乘之得一萬四千八百零五步以元長除之得一百六十四步五分倍之得三百二十九步另以小邊元濶自乘得四百步兩數並共七百二十九步平方開之得二十七步即所求解曰甲乙丙丁全形己辛丙丁截形丙丁與甲乙為兩元濶辛己為截濶丙戊為元長丙庚為截長庚己為小邊與截濶之較線甲戊為兩元濶之較線癸辛為截濶上方形子辛為小邊上方形庚辛與丙丁等癸辛之大于子辛者為丑寅兩亷與夘一隅夘隅即較線庚己上方形也截形以丙庚線分之必成庚丁一直形己丙庚一勾股形若以截長丙庚除直形必得辛庚線再以較線己庚乘之必成一亷兩亷俱以小邊為長以較線為濶若以截長丙庚除勾股必得庚壬線庚壬者庚己之半也再以庚己乘之必成半隅然直形與勾股兩形實一截形之分也若以己庚乘截積以丙庚除之亦必得一亷半隅也又全形之比例與截形等本巻四十九則丙戊之與甲戊必若丙庚之與己庚故置截積以元長丙戊除之以兩邊較線甲戊乘之亦得一亷半隅與前同倍之則成兩亷一隅夫小邊上方形之小于截濶上方形者此兩亷一隅也並之則成截濶上方形矣故平方開之得截濶五十二則斜方形依大邊截積求截濶設斜方田元長九十步大邊濶三十八步小邊濶二十步自大邊截積一千七百八十七步五分求截濶法曰置積為實以兩元濶相減餘一十八步乘之得三萬二千一百七十五步以元長除之得三百五十七步五分倍之得七百一十五步另以大邊元濶自乘得一千四百四十四步兩數相減餘七百二十九步平方開之得二十七步即所求解曰既自大邊截積則元形之大邊亦即截形之大邊而截濶為小邊小邊上方形之小于大邊上方形者兩亷一隅也故于大邊上方形内減去兩亷一隅平方開之即得截濶若並求長得濶用本巻四十八則法求之五十三則梯形截勾股設梯田元長一百二十步大邊濶八十步小邊濶二十步自一角截勾股積三百四十八步四分八釐求截濶法曰置積倍之得六百九十六步九分六釐以兩元濶相減餘六十步折半得三十步乘之得二萬零九百零八步八分以元長除之得一百七十四步二分四釐平方開之得一十三步二分即所求解曰甲乙丙丁梯形減去甲戊丙丁斜方所餘必戊丁乙勾股形截積亦勾股形則是勾股截勾股也故法同勾股本巻四十六則若求長則倍截積以截濶除之即得本巻三十八則五十四則梯形截斜方設梯田元長一百二十步大邊濶八十步小邊濶二十步截斜方積三千六百步求截濶法曰置積為實以元長除之得三十步另以兩元濶相減餘六十步四歸之得一十五步兩數並得四十五步即所求解曰元長除截積得己戊甲庚為大邊大于小邊之半甲己又為甲庚之半則甲己為大邊大于小邊四分之一矣故四歸兩濶之較並己戊得截濶五十五則梯形截無法五邊形設梯田元長一百二十步大邊濶八十步小邊濶二十步截五邊形即甲戊己丁丙積五千六百五十一步五分二釐求截濶法曰先求梯田全積本巻七則減去截積餘三百四十八步四分八釐以梯田截勾股法求之本巻五十三則得濶一十三步二分以減大邊元濶餘六十六步八分即所求解曰一十三步二分者乙己戊餘形之濶乙戊也大邊元濶甲乙減去乙戊餘甲戊即截濶五十六則方環截外周設方環田外方七十步自外截積二千四百步求截環内方法曰置元方自乘得四千九百步減去截積餘二千五百步平方開之得五十步即所求解曰餘環外方即截環内方五十七則方環截内周設方環田内方三十步自内截積一千六百步求截環外方法曰置内方自乘得九百步與截積並得二千五百步平方開之得五十步即所求解曰内方自乘者補環内虚形以便開方也數學鑰巻一
