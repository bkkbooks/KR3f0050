body:
  text: 數學鑰卷三凡例柘城杜知耕撰凡例一則設一數與甲乙兩率為同名與丙丁兩率為異名置所設之數為實以甲乘丙除曰同乘異除以丙乘甲除曰異乘同除以丙乘甲得數乘實曰異乘同乘與以丙乘復以甲乘同以丙乘甲得數除實曰異除同除與以丙除復以甲除同以丙乘丁除曰異乘異除以甲乘乙除曰同乘同除二則設一數以一率除二率乘又以三率除四率乘又以五率除六率乘方得所求變為以四率乘二率復以六率乘之得數乘實以三率乘一率復以五率乘之得數除實即得所求亦曰同乘同除三則凡用一率除二率乘者則變為先以二率乘後以一率除凡用一率除復用二率除者則變為以一率乘二率得數除實恐歸除多有畸零不盡之數也四則設甲乙丙三率以甲乘乙以乙乘丙曰遞乘以甲乘乙以乙乘丙以丙復乘甲曰維乘以甲乘乙復以乙乘甲曰互乘以甲乘乙復乘丙曰遍五則命分數曰母得分數曰子母數者子之本數子數者母之分數六則設兩數一為法一為實以法除實得若干將法實任各若干倍之以倍法除倍實必仍得若干與原得數同若以倍法除元實則得數小于元得數之倍數即同元法小于倍法之倍數若以元法除倍實則得數大于元得數之倍數即倍實大于元實之倍數如元實為六十元法為五十以五十除六十得十二任三倍元實為一百八十亦三倍元法為一百五十以一百五十除一百八十亦得十二與元得數同以倍法一百五十除元實六十得四則四與元得數十二之比例若元法五十與倍法一百五十也以元法五十除倍實一百八十得三十六則三十六與元得數十二之比例若倍實一百八十與元實六十也數學鑰卷三凡例欽定四庫全書數學鑰卷三上目録柘城杜知耕撰粟布一則糴糶一法二則糴糶二法三則糴糶三法四則糴糶四法五則糴糶五法六則糴糶六法七則糴糶七法八則糴糶八法九則撞換一法十則撞換二法十一則撞換三法十二則盤量倉窖十三則布帛十四則銀色一法十五則銀色二法十六則銀色三法十七則銀色四法十八則銀色五法十九則銀色六法二十則斤兩一法二十一則斤兩二法二十二則斤兩三法二十三則斤兩四法二十四則斤兩五法二十五則斤兩六法二十六則權重一法二十七則權重二法增二十八則權重三法卷三下目録衰分一則合率差分二則折半差分三則四六差分四則三七差分五則二八差分六則遞減差分一法七則遞減差分二法八則遞減差分三法九則帶分子母差分一法十則帶分子母差分二法十一則互和遞減差分一法十二則互和遞減差分二法十三則匿價差分一法十四則匿價差分二法十五則二色差分十六則三色差分四色五色六色附十七則貴賤和率差分十八則首尾和率差分附分法一則命分二則約分三則乘分四則課分五則通分數學鑰卷三目録欽定四庫全書數學鑰卷三上柘城杜知耕撰粟布一則糴糶一法設粟三十五石每石價銀二錢五分求共銀法曰置粟為實以價乘之得八兩七錢五分即所求二則糴糶二法設粟三十五石賣銀八兩七錢五分求每石價法曰置銀為實以粟除之得二錢五分即所求三則糴糶三法設粟每石價銀二錢五分今有銀八兩七錢五分求值粟法曰置銀為實以價除之得三十五石即所求四則糴糶四法設銀八兩七錢五分共買粟三十五石求每銀一兩值粟若干法曰置粟為實以銀除之得四石即所求解曰凡以物交易或論箇論斛論斤論尺之類莫不有數有價以價乘共物則得共銀以價除共銀則得共物以共物除共銀則得每一物所值之價以共銀除共物則得每銀一兩或一錢或一分所值之物交易常用之法盡于此矣五則糴糶五法設原有粟二石六斗賣銀六錢五分今有粟三十五石求值銀法曰置今粟為實以原價乘之得二十二兩七錢五分以原粟除之得八兩七錢五分即所求解曰此異乘同除也銀與粟異名以原銀乘今粟故謂異乘粟與粟同名以原粟除今粟故謂同除若以原粟除原價得每石價以乘今粟或先以原粟除今粟再以原價乘之俱未嘗不合但先用歸除恐遇竒零不盡之數難用乘法故變為先乘後除也六則糴糶六法設原有銀三十兩零七錢五分買粟一百二十三石今有銀八兩七錢五分求值粟法曰置今銀為實以原粟乘之得一千零七十六兩二錢五分以原銀除之得三十五石即所求解同前七則糴糶七法設原銀五錢買米一石每米八斗五升換粟一石七斗今有銀八兩七錢五分求值粟法曰以今銀八兩七錢五分乘粟一石七斗得一十四兩八錢七分五釐為實以米價五錢乘米八斗五升得四錢二分五釐為法除之得三十五石即所求解曰米八斗五升粟一石七斗其價等法以米價乘米所得之四錢二分五釐既為八斗五升之米價亦一石七斗之粟價也以粟乘銀以價除之亦異乘同除法也八則糴糶八法設粟一石七斗換米八斗五升每米一石價銀五錢今有粟三十五石求值銀法曰置米八斗五升以米價五錢乘之得四錢二分五釐再以今粟三十五石乘之得一十四兩八錢七分五釐為實以粟一石七斗除之得銀八兩七錢五分即所求解同前九則撞換一法設稻每石價六錢二分五釐粟每石價二錢五分今有稻一十四石換粟求粟數法曰置稻一十四石為實以稻價乘之得八兩七錢五分以粟價除之得三十五石即所求十則撞換二法設每菽三斗換黍二斗每黍四斗換稷三斗每稷五斗換稻四斗每稻六斗換麥五斗今有麥七斗換菽求菽數法曰以今麥七斗乘每稻六斗得四石二斗再以每稷五斗乘之得二十一石再以每黍四斗黍之得八十四石再以每菽三斗乘之得二百五十二石為實以換黍二斗乘換稷三斗得六斗再以換稻四斗乘之得二石四斗再以換麥五斗乘之得一十二石為法除之得二石一斗即所求解曰若置麥七斗為實以換麥五斗除之以每稻六斗乘之得八斗四升為麥七斗應換之稻再以八斗四升為實以換稻四斗除之以每稷五斗乘之得一石零五升為麥七斗應換之稷再以一石零五升為實以換稷三斗除之以每黍四斗乘之得一石四斗為麥七斗應換之黍再以一石四斗為實以換黍二斗除之以每菽三斗乘之得二石一斗為麥七斗應換之菽凡四除四乘方得菽數今遞乘為實遞乘為法一次歸除即得所求非徒省力亦免遇畸零之數難於布算耳十一則撞換三法設黍一石換菽三石每黍三石換麥一石今黍三十三石共換菽麥一十九石求菽麥各若干法曰列黍三石黍一石共黍三十三石于左列麥一石菽三石共菽麥一十九石于右先以右上互乘左中仍得一石以左上互乘右中得九石兩數相減餘八石為長法次以左中互乘右下仍得一十九石以右中互乘左下得九十九石兩數相減餘八十石以長法除之得一十石為短法以麥一石乘短法仍得十石為麥數以黍三石乘短法得三十石為換麥黍數以麥數減共菽數餘九石為菽數以換麥黍數減共黍餘三石為換菽黍數解見三卷下十七則十二則盤量倉窖設直倉底長七尺濶五尺髙八尺求容粟數法曰以底濶乘長得三十五尺再以髙乘之得二百八十尺為實取木板四塊如圖錯綜合之令縱廣及髙各一尺納粟于內令平以升量之假如一斗二升即以之為法乘實得三十三石六斗即所求解曰倉窖形狀不一求積法俱詳四卷十三則布帛設原買布長四十尺濶二尺二寸價銀七錢五分今有布長三十六尺濶一尺八寸求價法曰置今布長三十六尺以濶一尺八寸乘之得六十四尺八寸再以原價七錢五分乘之得四十八兩六錢為實另置原布長四十尺以濶二尺二寸乘之得八十八尺為法除實得五錢五分二釐二毫有竒即所求十四則銀色一法設九三色銀一兩二錢傾銷足色求銀數法曰置銀一兩二錢為實以銀色九三乘之得一兩一錢一分六釐即所求十五則銀色一法設足色銀一兩一錢一分六釐改傾九三色求銀數法曰置銀一兩一錢一分六釐為實以九三除之得一兩二錢即所求十六則銀色三法設八五色銀五兩六錢改傾九五色銀求銀數法曰置銀五兩六錢為實以八五乘之得四兩七錢六分再以九五除之得五兩零一分零五毫即所求十七則銀色四法設足色銀七兩六錢五分傾成九兩求銀色法曰置銀七兩六錢五分為實以九兩除之得八五即所求十八則銀色五法設足色銀三十五兩二錢改傾八八色銀求加銅數法曰置銀三十五兩二錢為實以八八除之得四十兩與原銀相減餘四兩八錢即所求十九則銀色六法設傾八八色銀用銅四兩八錢求用銀數法曰置銅四兩八錢為實以八八與一兩相減餘一錢二分為法除之得四十兩與銅數相減餘三十五兩二錢即所求二十則斤兩一法設物重一千四十兩求斤法曰置物重為實以斤法十六除之得六十五斤即所求二十一則斤兩二法設物重六十五斤求兩法曰置物重為實以斤法十六乘之得一千四十兩即所求二十二則斤兩三法設物重六十五斤四兩每斤價二錢五分求共價法曰先取四兩以斤法十六除之得二五並六十五斤之下成六五二五為實以價乘之得一十六兩三錢一分二釐五毫即所求二十三則斤兩四法設物每斤價二錢五分今銀一十六兩三錢一分二釐五毫求值物重法曰置今銀為實以價為法除之得六十五斤二五取斤下二五以斤法十六乘之得四兩共六十五斤四兩即所求二十四則斤兩五法設物每斤價四兩求每兩價法曰置每斤價為實以斤法十六除之得二錢五分即所求二十五則斤兩六法設物每兩價二錢五分求斤價法曰置每兩價為實以斤法十六乘之得四兩即所求二十六則權重一法設稱原錘重二十六兩遇重物不能勝另取一物重四十六兩八錢作錘稱之得一千零七十二兩求物重真數法曰置物重一千零七十二兩為實以借用作錘之四十六兩八錢乘之得五萬零一百六十九兩六錢再以原錘二十六兩除之得一千九百二十九兩六錢即所求解曰借用之錘重于原錘若干倍則借用之錘所稱之物重亦重于原錘所稱之物重若干倍以原錘除借用之錘得一八是借用之錘重於原錘十分之八也則于借用錘所稱之一千零七十二兩以十分之八加之必得一千九百二十九兩六錢為原錘所稱之重法先乘後除者亦異乘同除也本卷五則二十七則權重二法設稱失其錘止有原稱過輕重二物重者重一千九百二十九兩六錢輕者重四十六兩八錢以輕者作錘稱重者得一千零七十二兩求原錘重法曰置四十六兩八錢為實以一千零七十二兩乘之得五萬零一百六十九兩六錢以一千九百二十九兩六錢除之得二十六兩即所求解曰一千九百二十九兩六錢之與一千零七十二兩若四十六兩八錢之與原錘也故以之乘除得原錘之重二十八則權重三法設稱失其錘有輕重兩物不知斤兩以輕者作錘稱重者得五十二兩以重者作錘稱輕者得一十三兩求原錘重法曰置兩數相乘得六百七十六兩平方開之得二十六兩即所求解曰兩數之中率即原錘之重兩數相乘平方開之求中率之法也二卷十六則又法以等重二物一作錘一作物稱之所得之數即原錘之重按以上三法用之于平星提索同居一位之稱雖有微差尚可得近似之數至于平星提索不同一位相去愈逺其差愈多甚至與真數懸絶留心此道者不可不知也數學鑰卷三上欽定四庫全書數學鑰卷三下柘城杜知耕撰衰分諸分附一則合率差分設有銀一百二十一兩一錢七分五釐買稻麥菽三等糧買稻一分每斗價九分二釐麥二分每斗價八分五釐菽三分每斗價三分六釐求三色糧各若干法曰置共銀為實另二因麥價得一錢七分三因菽價得一錢零八釐與稻價並共三錢七分為法除實得三十二石七斗五升為稻數二因稻數得六十五石五斗為麥數三因稻數得九十八石二斗五升為菽數解曰稻一麥二菽三共六衰而稻為六分之一麥為六分之二菽為六分之三二因麥價者令麥二倍于稻也三因菽價者令菽三倍于稻也合二與三得五是麥菽得五而稻得一則稻為六分之一矣故並價除實即得稻數也麥原二倍于稻故二因稻數得麥數菽原三倍于稻故三因稻數得菽數如求各銀數則以各價乘各數即得二則折半差分設銀六百七十二兩令甲乙丙三等人折半納之求各應納銀數法曰置共銀為實定丙為一衰乙倍丙為二衰甲倍乙為四衰並之共七衰為法除實得九十六兩為丙數二因丙數得一百九十二兩為乙數二因乙數得三百八十四兩為甲數解曰所謂折半者令乙半於甲丙半於乙以一為丙衰倍一得二為乙衰乙倍于丙即丙半於乙也倍二得四為甲衰甲倍于乙即乙半于甲也並之共得七衰而丙為七分之一故以七除實得丙數餘同前解三則四六差分設銀八百一十二兩五錢令甲乙丙丁四等人四六納之求各應納銀數法曰置共銀為實先定丁為四衰以一五乘四得六為丙衰再以一五乘六得九為乙衰再以一五乘九得十三衰五分為甲衰並之共三十二衰五分為法除實得二十五兩為一衰之數四因二十五兩得一百兩為丁數六因二十五兩得一百五十兩為丙數九因二十五兩得二百二十五兩為乙數以十三衰五分乘二十五兩得三百三十七兩五錢為甲數解曰定衰之法當六乘四除今用一五乘何也蓋四之于六若一與一五也以一五乘四得六乘六得九乘九得十三五而十三五之與九九之與六皆若六之與四也並四數共三十二衰半除實所得銀數即原銀三十二分五釐之一而丁應納者則三十二分五釐之四故四因一衰之數得丁數也餘同前解四則三七差分設有銀一千九百七十五兩令甲乙丙三等人三七納之求各應納銀數法曰置共銀為實先定丙為九衰七因三歸得二十一為乙衰再七因三歸得四十九為甲衰並之共七十九衰為法除實得二十五兩為一衰之數九因之得二百二十五兩為丙數以二十一乘之得五百二十五兩為乙數以四十九乘之得一千二百二十五兩為甲數解曰不以三為丙衰而以九為丙衰者以三為丙衰則不能得甲衰也何也試定三為丙衰七為乙衰七因三歸則得一六三三不盡定九為丙衰正為甲衰地也若甲乙丙丁四位則九又不可為丁衰必三倍之得二十七為丁衰若五位又三倍二十七得八十一為戊衰位多者倣此五則二八差分設有銀一千零五十兩令甲乙丙三等人二八納之求各應納銀數法曰置共銀為實先定二為丙衰四因二得八為乙衰四因八得三十二為甲衰並之共四十二衰為法除實得二十五兩為一衰之數二因之得五十兩為丙數八因之得二百兩為乙數三十二乘之得八百兩為甲數解曰遞以四因定衰者以八四倍于二也六則遞減差分一法設米一千一百三十四石令五等人户遞減納之一等二十四戶二等三十三戶三等四十二戶四等五十一戶五等六十户求每等及每戶應納銀數法曰置共米為實先定五等六十戶為六十衰二因四等戶數得一百零二衰三因三等戶數得一百二十六衰四因二等戶數得一百三十二衰五因一等戶數得一百二十衰五數並共五百四十衰為法除實得二石一斗為第五等每戶納數以五等六十戶乘之得一百二十六石為第五等共納數以二因二石一斗得四石二斗為第四等每戶納數以四等五十一戶乘之得二百一十四石二斗為第四等共納數以三因二石一斗得六石三斗為第三等每戶納數以三等四十二戶乘之得二百六十四石六斗為第三等共納數以四因二石一斗得八石四斗為第二等每户納數以二等三十三戶乘之得二百七十七石二斗為第二等共納數以五因二石一斗得十石零五斗為第一等每戶納數以一等二十四戶乘之得二百五十二石為第一等共納數解同本卷一則七則遞減差分二法設有米二百四十石令甲乙丙丁戊五人納之定甲乙二人納數與丙丁戊三人納數等求各應納米數法曰置共米為實先以一為戊衰二為丁衰三為丙衰四為乙衰五為甲衰次並戊一丁二丙三得六並乙四甲五得九以六減九餘三于每人衰數各增三戊得四衰丁得五衰丙得六衰乙得七衰甲得八衰並之共三十衰為法除實得八石為一衰之數四因之得三十二石為戊數五因之得四十石為丁數六因之得四十八石為丙數七因之得五十六石為乙數八因之得六十四石為甲數解曰若六位令丙丁戊己四人與甲乙二人納數等則並己一戊二丁三丙四共十並乙五甲六共十一兩數相減餘一為實另以甲乙二人與丙丁戊己四人相減餘二人為法歸之得五各加入每人衰數己得一五戊得二五丁得三五丙得四五乙得五五甲得六五若七位令丙丁戊己庚五人與甲乙二人納數等並庚一己二戊三丁四丙五共十五並乙六甲七共十三是四人衰數反多于二人衰數前法不行矣則置各衰自乘庚得一己得四戊得九丁得十六丙得二十五並之共五十五乙得三十六甲得四十九並之共八十五兩數相減餘三十為實另以甲乙二人與丙丁戊己庚五人相減餘三人為法歸之得十各加入每人衰數庚得十一己得十四戊得十九丁得二十六丙得三十五乙得四十六甲得五十九餘倣此八則遞減差分三法設米二百六十五石令三等人戶納之上等二十戶每戶多中等七斗中等五十戶每戶多下等五斗下等一百一十戶求各應納米數法曰置共米為實並七斗五斗共一石二斗乘上等尸數得二十四石以五斗因中等尸數得二十五石兩數並共四十九石減實餘二百一十六石並三等尸數共一百八十戶為法除之得一石二斗為下等納數加五斗共一石七斗為中等納數再加七斗共二石四斗為上等納數以每等納數乘每等戶數得每等共納數解曰共米內減去上中兩等多于下等米數所餘即一百八十戶均平公納之米除實得一石二斗即每戶均納之數均納之數即下等每戶應納之數也故加五斗得中等每戶納數再加七斗得上等每戶納數九則帶分子母差分一法設甲乙丙三人納銀令乙納甲數六分之五丙納甲數四分之三乙多丙納銀八兩求共銀及各應納銀數法曰列母四子三于左母六子五于右右上互乘左下得十八左上互乘右下得二十左上右上相乘得二十四以十八減二十餘二為法另以乙多丙八兩乘二十四得一百九十二兩以法除之得九十六兩即甲數以八兩乘二十得一百六十兩以法除之得八十兩即乙數以八兩乘十八得一百四十四兩以法除之得七十二兩即丙數並之得二百四十八兩即共銀數解曰此借比例以求真數也二十四與二十六分之五也二十四與十八四分之三也六分之五之二十較四分之三之十八多二六分之五之乙數較四分之三之丙數却多八兩則二十四之與甲數二十之與乙數十八之與丙數其比例必皆若二與八也故八乘二除各得真數也十則帶分子母差分二法設布一十二萬四千四百八十五匹給散軍士每三名給襖布七匹每四名給褲布五匹求軍數法曰列三名七匹于右四名五匹于左右上互乘左下得十五左上互乘右下得二十八並之共四十三為法另以左上右上相乘得一十二以乘共布得一百四十九萬三千八百二十匹以法除之得三萬四千七百四十名即所求解曰十二為三名者四當給襖布二十八匹為四名者三當給褲布一十五匹是每軍士十二名給布四十三匹也反之每給布四十三匹得軍士一十二名也故十二乘四十三除得軍數也十一則互和遞減差分一法設米一百八十石令甲乙丙三人遞減納之定甲多丙米三十六石求各應納米數法曰置共米以人數歸之得六十石為乙數另置甲多丙數折半得一十八石加乙數得七十八石為甲數減乙數得四十二石為丙數解曰甲多于乙數必為甲多于丙數之半丙少于乙數亦必為丙少于甲數之半兩相折凖是甲丙共得三分之二而乙自得三分之一故三歸之得乙數加減之得甲與丙數也十二則互和遞減差分二法設令甲乙丙丁四人遞減納銀定甲納六十九兩丁納五十一兩求乙丙應納數及共銀數法曰以丁數減甲數餘一十八兩三歸之得六兩加丁數得五十七兩為丙數加丙數得六十三兩為乙數並之共二百四十兩為共銀數解曰甲多于乙乙多于丙丙多于丁三數並與甲多于丁數等故三歸得每率遞差之數凡四位以上皆取首尾兩數相減五位則四歸之六位則五歸之七位則六歸之即得每率遞差之數餘同前十三則匿價差分一法設銀一百八十兩零二錢五分買麥六十五石菽二十五石麥每石多菽價一兩零七分求各價法曰置麥以麥多菽價乘之得六十九兩五錢五分以減元銀餘一百一十兩零七錢並麥菽兩數除之得一兩二錢三分即菽價加麥多菽價得二兩三錢即麥價解曰減去麥多菽價餘銀即菽九十石之共價故以九十石歸之得菽價十四則匿價差分二法設稻一十八石稷二十二石其值適等交換五石則兩率差銀一兩六錢二分五釐求各價法曰置一兩六錢二分五釐以交換五石歸之得三錢二分五釐以乘稻一十八石得五兩八錢五分另以稻一十八石減稷二十二石餘四石為法除之得一兩四錢六分二釐五毫即稷價另以三錢二分五釐乘稷二十二石得七兩一錢五分以前法除之得一兩七錢八分七釐五毫即稻價解曰交換五石兩率相差一兩六錢二分五釐則一兩六錢二分五釐必稻五石多稷五石之價也以五歸之得三錢二分五釐即稻稷每石相差之價稻稷既每石相差三錢二分五釐則一十八石必差五兩八錢五分矣今稷多稻四石而價適等是稷四石之價必五兩八錢五分也故四歸之得稷價又稻與稷價之比例原若十八與二十二既以三錢二分五釐乘稻一十八石得稷每四石之價則以三錢二分五釐乘稷二十二石必得稻每四石之價無疑矣故四歸之得稻價十五則二色差分設銀六十七兩五錢共買稻菽一百石稻每石價八錢菽每石價三錢求稻菽各若干法曰以菽價乘共一百石得三十兩以減原銀餘三十七兩五錢為實以兩價相減餘五錢為法除之得七十五石即稻數以減共一百石餘二十五石即菽數解曰原銀為稻菽共百石之價以菽價乘百石為菽百石之價兩率不等者以稻貴于菽也今稻每石多菽價五錢是兩率每相差五錢百石內必有稻一石兩率相減餘銀三十七兩五錢凡為五錢者七十五故得稻七十五石也十六則三色差分四色五色六色附設銀十兩零五錢共買稻麥菽一十八石稻每石價八錢麥每石價六錢菽每石價三錢求三色各若干法曰置共糧以三歸之得六石為麥數以麥價因之得三兩六錢為麥共價另以麥數減共糧餘一十二石以菽價因之得三兩六錢另以麥共價減原銀餘六兩九錢兩數相減餘三兩三錢為實稻菽兩價相減餘五錢為法除之得六石六斗為稻數以稻麥兩數減共糧餘五石四斗為菽數解曰若四色則四歸共物得若干即第二色數亦即第三色數以第二色價乘之得第二色共價以第三色價乘之得第三色共價以兩數減共物兩共價減原銀餘依二色差分法求之五色則五歸六色則六歸之倣此按三色以上亦可與共物共價相合無差然實非一定不易之數即前三色論之設稻九石共價七兩二錢麥二石共價一兩二錢菽七石共價二兩一錢亦與原銀共糧共價皆合而與上法所求三色之數不同十七則貴賤和率差分設銀一百二十七兩五錢共買稻麥一百零八石每稻三石價四兩每麥四石價三兩五錢求二色數及價各若干法曰列稻三石麥四石共稻麥一百零八石于右次列稻價四兩麥價三兩五錢原銀一百二十七兩五錢于左以右上互乘左中得十兩零五錢以左上互乘右中得一十六兩兩數相減餘五兩五錢為長法次以右中互乘左下得五百一十兩以左中互乘右下得三百七十八兩兩數相減餘一百三十二兩以長法除之得二十四為短法以稻三石乘短法得七十二石即稻數以稻價乘短法得九十六兩即稻共價以稻數減共稻麥一百零八石餘三十六石即麥數以稻共價減原銀一百二十七兩五錢餘三十一兩五錢即麥共價解曰此與前二色差分同但彼數齊此數不齊耳凡數之不齊者必假一數以齊之今稻三石麥四石則以十二齊之何為必齊之十二也十二為四倍稻三石三倍麥四石之數也以稻三乘麥價即得麥十二石之價以麥四乘稻價即稻十二石之價兩數相減為長法者即稻十二石多于麥十二石之銀數亦即稻四石多于麥四石之價又三倍之之數也以麥價乘共稻麥一百零八石即麥四百三十二石之價亦即一百零八石盡皆為麥而又四倍其價之數也以麥四乘原銀即稻麥四百三十二石之共價亦即稻麥一百零八石之原價而又四倍之之數也兩數相減之餘即麥四百三十二石少于稻麥共四百三十二石之價實即稻七十二石多于麥七十二石之價又四倍之之數也以之為實若以稻四石多于麥四石之價除之必得稻七十二石今稻四石多于麥四石之價不可得止得稻十二石多于麥十二石之價為長法除實得二十四二十四者即為稻三石者二十四也十二石三倍多于四石二十四三倍少于七十二石蓋法增若干倍得數即減若干倍也故為短法以稻三石乘之得稻數以稻價乘之得共稻價若欲先得麥數則以稻三石乘元銀以稻價乘共稻麥數兩數相減以長法除之得數為短法以麥四石乘之得麥數以麥價乘之得共麥價解同前按此條當列稻三石價四兩共稻麥一百零八石于右列麥四石價三兩五錢共銀一百二十七兩五錢于左以左上互乘右中得一十六兩以右上互乘右中得十兩零五錢兩數相減餘五兩五錢為法次以左上右上相乘得一十二石以乘左下得一千五百三十兩以左中十兩零五錢乘右下得一千一百三十四兩兩數相減餘三百九十六兩為實以法除之得七十二石即稻數似較舊法更捷舊法以十二倍之法除四倍之實故止得二十四以稻三石乘之方得稻數後法以十二倍之法除十二倍之實故一除即得稻數無須再乘也十八則首尾兩和差分設十人挨次遞減納銀甲乙丙三人共納一十三兩八錢庚辛壬癸四人共納一十三兩求各應納銀數法曰列三人于右上定甲九衰乙八衰丙七衰共二十四衰列于右中三人納數列于右下次列四人于左上定庚三衰辛二衰壬一衰共六衰列于左中四人納數列于左下先以右上遍乘左行中得一十八衰下得三十九兩六錢次以左上遍乘右行中得九十六衰下得五十五兩二錢以兩下對減餘一十五兩六錢為實兩中對減餘七十八衰為法除之得二錢為十人挨次遞減之數另以右上歸右下得四兩六錢為乙數加乙二錢得四兩八錢為甲數減乙二錢得四兩四錢為丙數減丙二錢得四兩二錢為丁數以下各遞減二錢得應納銀數解曰首三人尾四人兩數不齊不可相減以求首尾相差之數故互乘以齊之夫左下尾四人共納之銀數也以右上三人乘之得三十九兩六錢即三倍尾四人為一十二人之納數右下首三人共納之銀數也以左上四人乘之得五十五兩二錢即四倍首三人亦為一十二人之納數對減之餘即首十二人多于尾十二人之納數故以為實左中尾四人之衰數以右上三人乘之得十八即三倍尾四人為一十二人之衰數右中首三人之衰數以左上四人乘之得九十六即四倍首三人亦為一十二人之衰數對減之餘即首十二人多于尾十二人之衰數故以為法以法除實所得非一衰之銀數而何一衰之銀數即十人挨次遞減之數也以右上三人歸右下納數即得乙數何也蓋乙多于丙者即甲多于乙者也減甲之多補丙之少則成三平數乙居甲丙之中故三歸之得平數即得乙數也數學鑰卷三下欽定四庫全書數學鑰卷三附柘城杜知耕撰分法一則命分設銀四十兩三人分之求每人應分銀數法曰置銀為實以人數除之得一十三兩餘一不盡則以法為分母以不盡之一為分子命為一十三兩又三分兩之一解曰三分兩之一即三錢三分三三不盡二則約分設以九十八為法除實不盡者四十二求約若干法曰以子四十二減母九十八餘五十六再減之餘一十四復以母十四減子四十二餘二十八再減之亦餘一十四謂之子母相同即以十四為法除母九十八得七除子四十二得三即命為七分之三解曰母數九十八是七箇十四子數四十二是三箇十四九十八之與四十二若七之與三也故命為七分之三遇不可約之數直以本數命之如母九十七子四十二此數之不可約者也直命為九十七之四十二三則乘分設一十八人分銀每人分得三百七十六兩又九分兩之六求共銀法曰置三百七十六兩為實以母九因之得三千三百八十四兩加入子六共三千三百九十兩以人數乘之得六萬一千零二十兩再以母九歸之得六千七百八十兩即所求解曰不以母因實則不能加入子數故因實以就子也四則課分設有布二匹又九分匹之五用過一匹又六分匹之一求餘布法曰置用過布一匹以母六因之仍得六加入子一共七又以原布母九因之得六十三另置原布二匹以母九因之得一十八加入子五共二十三又以用過布母六因之得一百三十八兩數相減餘七十五為實以兩母謂九與六相乘得五十四為法除之得一匹零二十一以約分法約之得十八之七即命為餘布一匹又十八分匹之七解曰兩數各帶子母不得不兩因之兩因之不得不兩歸之法以兩母相乘除實者與兩歸得數同也五則通分設粟四十五石每七分石之五值銀八分兩之六求共銀法曰置粟為實以粟母七乘銀子六得四十二為法乘實得一千八百九十另以銀母八乘粟子五得四十為法除之得四十七兩二錢五分即所求解曰原當置粟為實以粟母七乘之粟子五除之求得共粟七分之五再以銀子六乘之銀母八除之即得銀數然既以粟母七乘之又以銀子六乘之不如以粟母七乘銀子六以乘之也既以粟子五除之又以銀母八除之不如以銀母八乘粟子五以除之也數學鑰卷三附
