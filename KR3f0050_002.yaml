body:
  text: 數學鑰卷二凡例柘城杜知耕撰凡例一則圓必中規不中規者不得為圓形形界曲線曰周如甲乙丙丁線過心直線曰徑如丁丙線二則一率自乘之數等于兩率相乘之數則此率為兩率之中率如甲與乙之比例猶乙與丙則乙為甲丙之中率三則設內外兩形內形或以角或以邊抵外形之界而不交曰相切如丙為甲乙之內切形甲乙為丙之外切形四則曲線直線相雜曰雜線形五則割甲乙丙丁圓之一分為甲乙丙弧矢形甲乙丙曲線曰背甲乙衡線曰弦丙丁縱線曰矢丙己曰全徑丁己曰餘徑丁戊曰離徑丙戊曰半徑六則設甲乙直線以線為徑作甲乙丙丁圓形曰甲乙線上圓形數學鑰卷二凡例欽定四庫全書數學鑰卷二目録柘城杜知耕撰方田下曲線類一則圓徑求周二則圓周求徑三則圓周徑求積四則圓徑求積五則圓周求積六則圓積求徑七則圓積求周八則圓環求積增九則圓環以積及內周求外周增十則圓環以積及外周求內周十一則圓環以積及內外周求環濶增十二則圓環以兩周求環濶增十三則圓環以積及濶求兩周增十四則圓環以積及濶求徑十五則圓環以全徑及虛徑求積西法十六則撱圓求積西法十七則弧矢求積增十八則弧矢形以積矢弦及離徑求背西法十九則弧矢形以矢弦求餘徑求全徑離徑半徑附西法二十則弧矢形以矢徑求弦二十一則弧矢形以離徑半徑求弦西法二十二則弧矢形以弦及餘徑求矢增二十三則弧矢形以弦及全徑求矢二十四則弧矢形以半弦半徑求矢二十五則弧矢形以半弦及離徑求矢增二十六則弧矢形以半徑半弦較及半弦離徑較求矢與弦二十七則舊弧矢法以矢弦求積二十八則舊弧矢法以積矢求弦二十九則舊弧矢法以積弦求矢增三十則增弧矢法以矢弦求積增三十一則圓截圓三十二則圓截弧矢西法三十三則弧矢形截雜線三角形三十四則方內減圓以餘積求圓積三十五則方內減圓以餘積求方積求方邊圓徑附三十六則圓內減方以餘積求方積求方邊圓徑附三十七則圓內減方以餘積求圓積三十八則方內減不相切之圓以餘積求方邊及圓徑增三十九則圓內減不相切之方以餘積求圓徑及方弦四十則諸雜線形求積數學鑰卷二目録欽定四庫全書數學鑰卷二柘城杜知耕撰方田下曲線類一則圓徑求周設圓田徑二十八步求周法曰置徑為實以周法二十二乘之得六百一十六步以徑法七除之得八十八步即所求解曰徑法七周法二十二者徑與周之比例若七與二十二也何也西洋亞竒默德云圓徑與圓周三倍又七十之十則朒謂周不及此數也三倍又七十一之十則盈謂周過于此數也先論三倍又七十之十曰丁甲乙半圜戊為心從甲作午子切線從乙從丁作乙己壬丁線各與乙戊半徑等設乙戊己角六十度己戊甲角必三十度為六邊形之半角也末從心過己過壬作戊午戊子線成戊午子等角形己戊壬既六十度則午子為等角形之邊設甲午股一百五十三步則戊午弦必三百零六步戊午元與午子等午子既倍大于甲午則戊午亦必倍大于甲午各自乘甲午股得二萬三千四百零九步戊午弦得九萬三千六百三十六步兩數相減餘七萬零二百二十七步平方開之得二百六十五步有竒為戊甲勾即半徑則戊甲與甲午之比例為二百六十五步有竒與一百五十三步次平分午戊甲角作戊庚線任分甲午于庚庚戊線割圜界于酉己酉甲酉兩弧等兩弧既等則酉戊己酉戊甲兩角必等故曰平分甲庚庚午兩線不等故曰任分則午戊與戊甲若午庚與甲庚合之戊午偕戊甲而與戊甲若午庚偕甲庚而與甲庚更之戊午並戊甲而與甲午甲午即午庚偕甲庚若戊甲與甲庚先定戊午戊甲並為五百七十一步有竒午甲為一百五十三步則戊午並戊甲與甲午之比例若五百七十一步有竒與一百五十三步則戊甲與甲庚之比例亦若五百七十一步有竒與一百五十三步矣即以兩數各自乘並而開方得五百九十一步又八之一不盡為庚戊線戊甲為勾甲庚為股庚戊為弦則庚戊與甲庚之比例若五百九十一步又八之一不盡與一百五十三步次平分庚戊甲角作戊辛線則戊庚並戊甲一千一百六十二步又八之一與庚甲一百五十三步若戊甲與甲辛若設甲辛為一百五十三步則戊甲為一千一百六十二步又八之一有竒兩數各自乘並而開方得一千一百七十二步又八之一為辛戊線甲戊為勾甲辛為股辛戊為弦則辛戊與辛甲之比例若一千一百七十二步又八之一與一百五十三步次平分辛戊甲角作戊寅線則辛戊並戊甲二千三百三十四步又四之一與辛甲一百五十三步若戊甲與甲寅設甲寅為一百五十三步則戊甲為二千三百三十四步又四之一兩數各自乘並而開方得二千三百三十九步又四之一有竒為寅戊線戊甲為勾甲寅為股寅戊為弦則寅戊與寅甲之比例若二千三百三十九步又四之一有竒與一百五十三步次平分寅戊甲角作未戊線則寅戊並戊甲四千六百七十三步五分有竒與寅甲一百五十三步若戊甲與甲未若設甲未為一百五十三步則戊甲為四千六百七十三步五分有竒子戊午為半圜三分之一即為全圜六分之一甲戊午為十二分之一甲戊庚為二十四分之一甲戊辛為四十八分之一甲戊寅為九十六分之一甲戊未為一百九十二分之一復作甲戊申角與甲戊未角等成未戊申三角形未甲申其切線也為九十六邊形之一邊此邊與全徑之比例若一百五十三步與四千六百七十三步五分未申倍大于未甲乙丁全徑亦倍大于甲戊半徑以一百五十三步乘九十六邊得一萬四千六百八十八步則全邊與全徑之比例為一萬四千六百八十八步與四千六百七十三步五分約之為三又七之一不足夫形外切線尚不及三又七之一況圜周乎次論三倍又七十一之十曰乙甲丙半圜乙丙徑戊心從丙作丙甲與半徑戊丙等甲丙即六邊形之一邊從乙作乙甲線成乙甲丙勾股形而甲為方角設甲丙勾為七百八十步乙丙弦為一千五百六十步兩數各自乘相減開方得一千三百五十一步不足為乙甲股則乙甲與甲丙之比例為一千三百五十一步與七百八十步次平分甲乙丙角作乙丁線以丁丙聨之成丁乙丙丙丁己兩勾股形自相似蓋同用丁方角在半圜內甲丁丁丙兩線所乘之弧等則丁丙己丁乙丙兩弧之角必等凡兩形有兩角等者各腰俱相似則乙丁大股與丙丁大勾若丁丙小股與丁己小勾又乙丙大弦與丁丙大勾若己丙小弦與丁己小勾更之乙丙與己丙兩弦若丁丙與丁己兩勾是乙丁與丁丙兩股丁丙與丁己兩勾乙丙與己丙兩弦三比例皆等又乙丙與己丙兩弦若乙丙並甲乙兩腰與甲丙底之兩分則乙丁與丁丙亦若乙丙並乙甲與甲丙先定乙甲一千三百五十一步弱乙丙一千五百六十步是乙甲乙丙並為二千九百一十一步弱甲丙先設七百八十步則乙丁與丁丙亦為二千九百一十一步弱與七百八十步各自乘並而開方得三千零一十三步又四之一弱為乙丙線乙丁丙形之弦則乙丙與丁丙之比例為三千零一十三步又四之一弱與七百八十步次平分丁乙丙角作辛乙線依前論丁乙並乙丙與丙丁若乙辛與辛丙先定乙丙三千零一十三步又四之一弱乙丁二千九百一十一步弱並為五千九百二十四步又四之一弱今丙丁為七百八十步則乙辛與辛丙為五千九百二十四步又四之一弱與七百八十步欲省數改設辛丙二百四十步改設乙辛一千八百二十三步弱兩數各自乘並而開方得一千八百三十八步又十一之九弱為乙丙線乙辛丙形之弦則二百四十步與一千八百三十八步又十一之九弱為丙辛乙辛之比例次平分辛乙丙角作乙壬線以壬丙線聨之辛乙乙丙兩數並三千六百六十一步又十一之九弱與辛丙二百四十步為乙壬與壬丙之比例又改設壬丙六十六步改設乙壬一千零七步弱兩數各自乘並而開方得一千零九步弱則六十六步與一千零九步弱為壬丙與乙丙之比例末平分壬乙丙角作乙庚線以庚丙線聨之乙庚與庚丙若壬乙並乙丙二千零一十六步又六之一與丙壬六十六步兩數各自乘並而開方得二千零一十七步又四之一弱為乙丙線乙庚丙形之弦則庚丙與乙丙之比例為六十六步與二千零一十七步又四之一弱丙甲弧為全圜六分之一丙丁十二分之一丙辛二十四分之一丙壬四十八分之一丙庚九十六分之一是丙庚為九十六邊內切圜形之一邊也以六十六步乘九十六邊得六千三百三十六步為九十六邊內切形之周乙丙徑為二千零一十七步又四之一弱約之徑一周三又七十一之十強夫圜內切線為三又七十一之十尚強況圜周乎按三又七十一之十設徑一則周三一四零八四五零七零四二二有竒設周一則徑三一八三八五六五零二二再約之徑七十一步周二百二十三步三又七十之十設徑一則周三一四二八五七一四二八五七有竒設周一則徑三一八一八一八一八一八有竒再約之徑七步周二十二步兩數皆不能與周徑吻合但徑七周二十二其數少整姑從之二則圓周求徑設圓田周八十八步求徑法曰置周為實以徑法七因之得六百一十六步以周法二十二除之得二十八步即所求解曰即前法反用之三則圓周徑求積設圓田周八十八步徑二十八步求積法曰置周折半得四十四步為實以徑折半得一十四步為法乘之得六百一十六步即所求解曰圓形與半徑為高全周為底之三角形等何也測量全義云甲乙丙丁圜自戊心百分之必皆成三角形而己戊甲其百分之一也次依甲戊半徑作庚戊辛三角形令庚辛底與圜之全周等自戊角百分之亦必皆成三角形而甲戊壬其百分之一也己戊甲甲戊壬兩分形己甲甲壬兩底既等又戊甲同高因推其容必等夫百倍己戊甲為甲乙丙丁全圜百倍甲戊壬為庚戊辛三角形兩分形既等兩全形有不等乎故法以半徑乘半周得庚戊辛三角形之積即得甲乙丙丁圜之積也或云己戊甲雖全圜百分之一其底終屬曲線不可與直線三角形為比不知甲戊壬角大于己戊甲角而己戊甲中垂線大于甲戊壬中垂線兩相折准即謂之無差亦可四則圓徑求積設圓田徑二十八步求積法曰置徑自乘得七百八十四步再以十一乘之得八千六百二十四步以十四除之得六百一十六步即所求解曰測量全義云甲乙丙丁圜庚戊辛三角形以半徑為高以圜周為底己壬為圜徑上方形己丁直形以全徑為濶以半徑為高而為己壬方形之半己戊癸三角形亦以全徑為濶半徑為高而為己丁直形之半己戊癸形既為己丁直形之半必為倍大于己丁之己壬方形四之一又己戊癸與庚戊辛兩形同以半徑為高凡兩形等高者形與形之比例若線與線兩線即兩底一卷四十五則今庚辛底與圜周等己癸底與圜徑等是己戊癸庚戊辛兩形之比例若圜徑七與圜周二十二若以四倍大于己戊癸之己壬方形與庚戊辛三角形較其比例必若二十八與二十二矣各以二約之為十四與十一夫庚戊辛三角形與圓形等本卷三則故方圓之比例亦若十四與十一法以圓徑自乘求己壬方形之積也以十一乘十四除取方積十四分之十一以為圓積也五則圓周求積設圓田周八十八步求積法曰置周自乘得七千七百四十四步以七因之得五萬四千二百零八步以八十八除之得六百一十六步即所求解曰戊己庚辛圜戊己徑與甲乙丙丁圜周等則兩圜之比例為其徑與徑再加之比例再加云者以兩徑各自乘之數以為比例也設甲乙徑七戊己徑二十二甲乙自乘得四十九戊己自乘得四百八十四是兩圜之比例若四十九與四百八十四又壬癸方形與戊己庚辛圜元若十四與十一本卷四則今戊己庚辛圜既為四百八十四壬癸方形必六百一十六是壬癸方形與甲乙丙丁圜必若六百一十六與四十九矣各以七約之為八十八與七法以圜周自乘即壬癸方形之積也以七乘八十八除取方積八十八分之七以為甲乙丙丁圜積也六則圓積求徑設圓田積六百一十六步求徑法曰置積為實以十四乘之得八千六百二十四步以十一除之得七百八十四步平方開之得二十八步即所求解曰以十四乘十一除者因圜積以求戊己方積也平方開之得方邊即得圜徑者方邊與圜徑等也七則圓積求周設圓田積六百一十六步求周法曰置積為實以八十八乘之得五萬四千二百零八步以七除之得七千七百四十四步平方開之得八十八步即所求解曰以八十八乘七除者因圜積以求圜周上方積也本卷五則故平方開之得圜周八則圓環求積設環田外周六十六步內周一十一步求積法曰置內外兩周各自乘外周得四千三百五十六步內周得一百二十一步兩數相減餘四千二百三十五步以七乘之得二萬九千六百四十五步以八十八除之得三百三十六步八分七釐五毫即所求解曰與方環求積同一卷三十三則及本卷五則九則圓環以積及內周求外周設圓環田積三百三十六步八分七釐五毫內周一十一步求外周法曰置積為實以八十八乘之得二萬九千六百四十五步以七除之得四千二百三十五步另置內周自乘得一百二十一步兩數並共四千三百五十六步平方開之得六十六步即所求解曰兩數並共成周上方積故平方開之得外周十則圓環以積及外周求內周設圓環田積三百三十六步八分七釐五毫外周六十六步求內周法曰置外周自乘得四千三百五十六步另置環積以八十八乘之得二萬九千六百四十五步以七除之得四千二百三十五步兩數相減餘百二十一步平方開之得一十一步即所求解曰外周上方積減去八十八乘七除之環積所餘即內周上方積也故平方開之得內周十一則圓環以積及內外周求環濶設圓環田積三百三十六步八分七釐五毫外周六十六步內周一十一步求環濶法曰置積為實以兩周相並共七十七步折半得三十八步五分為法除之得八步七分五釐即所求解曰全圓既同三角形則圓環必同梯形圓環之兩周猶梯形之兩濶也圓環之濶猶梯形之中長也故用梯形求長法一卷四十八則即得環濶十二則圓環以兩周求環濶設圓環田外周六十六步內周一十一步求環濶法曰置兩周各以七乘之外周得四百六十二步內周得七十七步各以二十二除之外周得二十一步內周得三步五分兩數相減餘一十七步五分折半得八步七分五釐即所求解曰外周所得者圓之全徑也內周所得者環內虛徑也全徑減虛徑所餘即環之兩濶故折半得一濶也十三則圓環以積及濶求兩周設圓環田積三百三十六步八分七釐五毫濶八步七分五釐求兩周法曰置積為實以濶除之得三十八步五分另置濶以二十二乘之得一百九十二步五分以七除之得二十七步五分與三十八步五分相並得六十六步即外周與三十八步五分相減得一十一步即內周解曰此亦梯形求濶法也法以環濶除積所得之三十八步五分即兩環周之中度也環濶為全徑與虛徑相差之半以二十二乘七除則為內外兩周相差之半矣故以之增減兩周之中度得兩周也十四則圓環以積及濶求徑設圓環田積三百三十六步八分七釐五毫濶八步七分五釐求全徑及虛徑法曰置積以十四乘之得四千七百一十六步二分五釐十一除之得四百二十八步七分五釐另置濶自乘得七十六步五分六釐二毫五絲以四因之得三百零六步二分五釐兩數相減餘一百二十二步五分為實以四因濶得三十五步為法除之得三步五分即虛徑倍濶得一十七步五分加之得二十一步即全徑解曰置積以十四乘十一除者令圓環積化為方環積也餘即方環求內方法一卷五十六則十五則圓環以全徑及虛徑求積設圓環田全徑二十一步虛徑三步五分求積法曰置兩徑各自乘全徑得四百四十一步虛徑得一十二步二分五釐兩數相減餘四百二十八步七分五釐以十一乘之得四千七百一十六步二分五釐十四除之得三百三十六步八分七釐五毫即所求解曰兩徑各自乘相減者求方環積也十一乘十四除者因方環積以求圓環積也十六則撱圓求積設撱圓田大徑九十步小徑四十步求積法曰置兩徑相乘得三千六百步以十一乘之得三萬九千六百步以十四除之得二千八百二十八步五分七釐有竒即所求解曰西洋亞竒默德云取撱圓兩徑之中率為徑作圓其容與撱圓等四九之中率為六謂四之與六猶六之與九也夫求中率之法以兩徑相乘平方開之即得然中率自乘之數實即兩徑相乘之數故法以兩徑相乘十一乘十四除為撱圓積也撱圓形狀不同恐不能無小差十七則弧矢求積設弧矢田矢濶五步弦長一十七步三分二釐有竒背二十步零九分五釐二毫有竒離徑五步求積法曰置背以離徑並矢共十步乘之得二百零九步五分二釐三毫有竒另置弦以離徑乘之得八十六步六分有竒兩數相減餘一百二十二步九分二釐三毫有竒折半得六十一步四分六釐一毫有竒即所求解曰甲乙丙弧矢形戊為圜心自甲自乙作甲戊乙戊兩線成甲戊乙丙雜線形其丙丁矢與丁戊離徑並即全圓之半徑甲丙乙背又為圓周之分線求積之法當與圓同夫圓以半徑乘周折半得積本卷三則則雜線形亦必以半徑乘背折半得積矣又雜線形內以甲乙線分之必成一甲乙丙弧矢形一甲戊乙三角形其三角形以甲乙弦為濶以丁戊離徑為高若以高乘濶折半必得三角形之積一卷五則于雜線形內減去三角積所餘非弧矢積而何故法以半徑乘背離徑乘弦相減折半得積也相減而後折半與各折半而後相減得數同十八則弧矢形以積矢弦及離徑求背設弧矢田積六十一步四分六釐一毫有竒矢五步弦一十七步三分二釐有竒離徑五步求背法曰置積倍之得一百二十二步九分二釐三毫有竒另置弦以離徑乘之得八十六步六分有竒兩數並得二百零九步五分二釐三毫有竒以矢並離徑共十步除之得二十步零九分五釐二毫有竒即所求解曰即前則求積法反用之十九則弧矢形以矢弦求餘徑求全徑離徑半徑附設弧矢田矢五步弦一十七步三分二釐有竒求餘徑法曰置弦折半得八步六分六釐有竒自乘得七十五步以矢除之得一十五步即所求解曰甲乙丙弧矢形丙丁為矢丁戊為離徑丁己為餘徑自圓心戊作戊乙線成丁戊乙勾股形丁乙半弦為股丁戊離徑為勾戊乙半徑為弦另作辛卯形為丁戊勾上方形庚壬形為戊乙弦上方形夫庚壬之大于辛卯者為癸丑子磬折形癸丑子磬折形必等于乙丁股上方形何也弦上方形與勾股上兩方形並等故也六卷一則若移子于寅則成癸丑寅直形必以勾弦較為濶勾弦和為長今戊乙弦等于戊丙戊丙之大于丁戊勾者為丙丁是丙丁矢即勾弦較也故以矢除丁乙半弦弧矢形之弦自乘之積即得勾弦和又乙戊弦勾股形之弦既半徑必與戊己等戊己合丁戊非丁己餘徑而何求得餘徑加矢即全徑減矢折半即離徑加矢折半即半徑二十則弧矢形以矢徑求弦設弧矢田矢五步徑二十步求弦法曰以矢減徑餘一十五步以矢乘之得七十五步平方開之得八步六分六釐有竒倍之得一十七步三分二釐有竒即所求解曰依前解矢與餘徑相乘之數即半弦自乘之數故平方開之得半弦倍之得全弦也二十一則弧矢形以離徑半徑求弦設弧矢田半徑十步離徑五步求弦法曰置半徑離徑各自乘半徑得一百步離徑得二十五步兩數相減餘七十五步平方開之得八步六分六釐有竒倍之得一十七步三分二釐有竒即所求解曰半徑乙戊為弦勾股形之弦離徑丁戊為勾求得乙丁股即半弦也弧矢形之弦故倍之得全弦二十二則弧矢形以弦及餘徑求矢設弧矢田弦一十七步三分二釐有竒餘徑一十五步求矢法曰置弦折半得八步六分六釐有竒自乘得七十五步以餘徑除之得五步即所求解曰依十九則解半弦自乘之數即矢偕餘徑相乘之數故以餘徑除之得矢二十三則弧矢形以弦及全徑求矢設弧矢田弦一十七步三分二釐有竒全徑二十步求矢法曰置弦徑各自乘弦得三百步徑得四百步兩數相減餘一百步平方開之得十步以減全徑餘十步折半得五步即所求解曰全徑上方形當矢偕餘徑矩內形四及矢與餘徑之較線上方形一一卷十三則全弦上方形當半弦上方形四又半弦上方形與矢偕餘徑矩內形等本卷十九則于全徑上方積內減去全弦上方積即減去矢偕餘徑矩內積四也則所餘必矢與餘徑之較線上方積平方開之即得矢與餘徑之較線故以之減徑折半得矢也二十四則弧矢形以半弦半徑求矢設弧矢田半弦八步六分六釐有竒半徑十步求矢法曰置半弦半徑各自乘半弦得七十五步半徑得一百步兩數相減餘二十五步平方開之得五步以減半徑得五步即所求解曰半弦丁乙為股戊乙半徑為弦求得丁戊勾即離徑也故以之減半徑得矢二十五則弧矢形以半弦及離徑求矢設弧矢田半弦八步六分六釐有竒離徑五步求矢法曰置半弦離徑各自乘半弦得七十五步離徑得二十五步兩數並得一百步平方開之得十步減去離徑得五步即所求解曰半弦丁乙圖同前則為股離徑丁戊為勾求得乙戊弦即徑也故減去離徑得矢二十六則弧矢形以半徑半弦較及半弦離徑較求矢與弦設弧矢田半徑多半弦一步三分四釐弱半弦多離徑三步六分六釐強求矢及弦法曰並兩數共五步以半徑多半弦之數乘之得六步七分倍之得一十三步四分平方開之得三步六分六釐以加半徑多半弦之數得五步即離徑再加半弦多離徑之數得八步六分六釐即半弦再加半徑多半弦之數得十步即半徑半徑減去離徑餘五步即矢解曰戊乙半徑圖同二十四則多于丁乙半弦之數即股弦較丁乙半弦多于丁戊離徑之數即勾股較勾股較並股弦較即勾弦較此即勾弦較股弦較求勾股弦法也六卷二十則二十七則舊弧矢法以矢弦求積設弧矢田矢十步弦二十步求積法曰置矢弦相並共三十步折半得一十五步以矢乘之得一百五十步即所求解曰舊說圓徑一周三甲乙丙丁圓徑二十步周六十步甲乙丙弧矢形為全圓之半其背為全周之半必三十步法以矢弦相並即與弧背等折半以矢乘之猶圓法以半徑乘周折半得積之義也本卷三則以舊法論全圓得積三百步而半圓之弧得積一百五十步與圍三徑一之數吻合無差過此以往其矢漸短弧形漸細其差漸多甚至百步之積有差至二十餘步者即如十七則弧矢田弦一十七步三分二釐有竒矢五步依舊法求之止得積五十五步八分較前法所求之積則少五步六分六釐有竒前法雖密于舊法然必背矢弦皆具方可起算舊法有矢有弦即可得積故並存之二十八則舊弧矢法以積矢求弦設弧矢田積五十五步八分矢五步求弦法曰置積倍之得一百分十一步六以矢除之得二十二步三分二釐減去矢餘一十七步三分二釐即所求解曰舊法以矢乘半弦半矢得弧矢積若以矢除弧矢積必仍得半弦半矢以矢除弧矢積既得半弦半矢以矢除弧矢之倍積不得一弦一矢乎一弦一矢內減去一矢所餘非弦而何二十九則舊弧矢法以積弦求矢設弧矢田積五十五步八分弦一十七步三分二釐求矢法曰置積八因之得四百四十六步四分另置弦自乘得二百九十九步九分八釐二毫四絲兩數並共七百四十六步三分八釐二毫四絲平方開之得二十七步三分二釐減去弦餘十步折半得五步即所求解曰甲丁方形邊與一弦二矢等甲戊乙己丁庚丙辛各與矢等其戊己等四直形即矢偕一弦一矢矩內形壬子即弦上方形也又弧矢形以矢乘半弦半矢得積本卷二十七則而當一直形之半則四直形必當八弧矢積矣是一弦二矢上方形與弦上方積一及弧矢積八並等反之則弦上方積一及弧矢積八並為一方其邊必一弦二矢也法並兩數以平方開之所得即一弦二矢之度故減弦折半得矢也舊弧矢法弦背積及徑輾轉相求共三百二十六法實亦不出十七則以下十法之外其不能該者止以上三法耳故存之三十則增弧矢法以矢弦求積設甲乙丙弧矢田丙丁矢五步甲乙弦一十七步三分二釐有竒求積法曰有矢與弦可得丁壬餘徑餘徑加矢可得丙壬全徑本卷十九則甲己與丙壬等即以甲己為弦甲乙為股求乙巳勾得十步六卷三則為乙巳庚餘弧之弦又將乙己折半得巳辛復為勾戊巳半徑為弦求戊辛股以減半徑戊庚與戊巳等餘庚辛一步三分四釐為乙己庚餘弧之矢另求甲己徑上半圓積得一百五十七步一分四釐二毫八絲本卷三則次求甲乙己勾股積得八十六步六分一卷四則與半圓積相減餘七十步零五分四釐二毫八絲為甲乙丙與乙己庚兩弧之共積置為實兩弧各以三弦一矢相並以矢乘之甲乙丙弧得二百八十四步八分乙己庚弧得四十一步九分九釐五毫六絲以甲乙丙弧數乘實得二萬零九十步零五分八釐九毫四絲四忽並兩弧數共三百二十六步七分九釐五毫六絲除之得六十一步四分七釐七毫五絲有竒即所求解曰此借兩弧三弦一矢以矢乘之之數為比例以分共積也此法較舊法為密然大弧既盈則小弧必朒較十七則未免有千一之差如必欲得弧積真數密量弧背從十七則可也三十一則圓截圓設圓田徑二十一步依外周截積三百三十六步八分七釐五毫求餘圓徑法曰置徑自乘得四百四十一步另置截積以十四乘之得四千七百一十六步二分五釐十一除之得四百二十八步七分五釐兩數相減餘一十二步二分五釐平方開之得三步五分即所求解曰此與方環截積同一卷五十六則三十二則圓截弧矢舊法設圓田徑一十三步截弧矢積三十二步求矢法曰置截積自乘得一千零二十四步為實用商法商矢四步即以所商之矢乘截積得一百二十八步為上亷另以矢每步加負隅二分五釐得五步與徑相減餘八步為餘徑又以所商之矢自乘得一十六步以乘餘徑得一百二十八步為下亷並兩亷共二百五十六步為法除實得四步即所求解曰弧矢之積元以矢乘半弦半矢而得本卷二十七則若以半弦半矢相並除積必得矢法置截積自乘是倍截積為三十二若以三十二半弦與三十二半矢並除倍積必亦得矢法以矢乘截積得三十二全矢是多三十二半矢少三十二半弦若以半弦大于半矢之數三十二倍之與三十二全矢並即與三十二半弦三十二半矢相並之數同今無半弦數須以矢乘餘徑以為半弦自乘之方本卷十九則如甲乙方形甲己為半弦甲丁為半矢丁己為半矢弦較即半弦大于半矢之度則丁己乙戊直形必半矢弦較以半弦為倍數者也庚辛等于丁己庚丙等于甲丁則庚丙戊辛直形必半矢弦較以半矢為倍數者也兩直形並再以矢乘之必半矢弦較以截積三十二為倍數者也何也弧矢之積元以矢乘半弦半矢而得故也甲乙大方形減去丁己乙戊與庚丙戊辛兩直形餘甲丙小方形為甲丁半矢之冪法所謂負隅也負隅既為半矢之冪必為全矢冪四分之一故法以二分五釐為負隅也法用矢自乘以乘餘徑與用矢乘餘徑再以矢乘之得數同也按元注云所得之矢過于所商之矢為約矢太短不及所商之矢為約矢太長宜更商之商約之法既無一定惟以意斟酌之若整齊之矢或一二商可得苟遇畸零之矢必至千百商不能得者古人于此條實無善法姑以此考驗所商之合否耳若止欲考驗所商之合否又何如以所商之矢求半弦本卷二十則再加半矢以矢乘之本卷二十七則合積為準過積為約矢太長不及積為約矢太短不較捷乎三十三則弧矢截雜線三角形設半圓弧矢田弦二十步自心截雜線三角形背長一十步零四分七釐六毫一絲六忽求截積法曰置截背以弦折半得十步乘之得一百零四步七分六釐一毫六絲折半得五十二步三分八釐零八絲即所求解曰雜線三角形為圓之分形故求積之法同圓本卷三則三十四則方內減圓以餘積求圓積設方田減去內切圓田四隅餘積一百六十八步求圓積法曰置積為實以圓法十一乘之得一千八百四十八步以圓法十一與方法十四相減餘三為法除之得六百一十六步即所求解曰圓既為方十四分之十一則方內減圓之餘積必為方十四分之三圓十一分之三矣故十一乘三歸得圓積也三十五則方內減圓以餘積求方積求方邊圓徑附設方田減去內切圓田四隅餘積一百六十八步求方積法曰置積為實以十四乘之得二千三百五十二步以圓法十一與方法十四相減餘三為法歸之得七百八十四步即所求解同前置方積平方開之即方邊亦即圓徑三十六則圓內減方以餘積求方積求方邊圓徑附設圓田減去內切方田餘積二百二十四步求方積法曰置積為實以七乘之得一千五百六十八步以七與圓法十一相減餘四為法歸之得三百九十二步即所求解曰內切方形之弦與外切方形之邊等則內切方形必倍小于外切方形而若七之與十四夫圓既為外方十四分之十一而內方不為圓十一分之七乎圓內減方之餘積為圓十一分之四即為內方七分之四故七乘四除得內切方積也置方積平方開之即得方邊倍方積平方開之即得圓徑三十七則圓內減方以餘積求圓積設圓田減去內切方田餘積二百二十四步求圓積法曰置積為實以圓法十一乘之得二千四百六十四步以圓法十一與七相減餘四為法歸之得六百一十六步即所求解同前三十八則方內減不相切之圓以餘積求方邊及圓徑設方田內減圓田方邊至圓周五步餘積一千七百二十五步求方邊及圓徑法曰置五步自乘得二十五步以三因之得七十五步與餘積並共一千八百步另置五步以六因之得三十步為縱方以平方帶縱開之得九十步則一卷十三減去縱方餘六十步即方邊再減兩邊各五步共十步餘五十步即圓徑解曰依圖分之成甲乙等方形四子丑等直形八乾坎等雜線三角形四其甲乙等四形即方邊至圓周五步自乘之方形也子丑等八形亦各以五步為濶其長則圓之半徑也乾坎等四形為方減內切圓形之餘積以方四圓三推之舊法謂方內容圓圓居方四分之三四形並必當方四分之一乾坎艮三形並必足以補癸形之闕而與一小方二直形一雜形並共凑成一坤震方形矣次移甲于丁移乙于戊移丙于己移子于午移丑于未移寅于申移卯于酉移辰于戌移巳于亥尚闕庚辛壬三形故法取方邊至圓周之五步自乘以三因之加入積內也自壬至丁凡六形每形濶五步共計三十步故法取方邊至圓周之五步以六因之為縱方也帶縱開方法置積四因之縱方自乘兩數並平方開之得長濶相和之度即兑巽與巽震並減去縱方即兑坤餘兩濶即坤巽與巽震並即方邊方邊之大于圓徑者為兩邊之各五步故減之得圓徑本則及下則皆用周三徑一法三十九則圓內減不相切之方以餘積求圓徑及方弦設圓田內減方田圓周至方角一步餘積四十三步求圓徑及方弦法曰置一步自乘仍得一步以二因之得二步與餘積並並四十五步另置一步以四因之得四步為縱方以平方帶縱開之得一十四步減去縱方即圓徑再減圓周至方角各一步共二步餘八步即方弦解曰依內方角作一圓線此圓線偕外圓周必成一圓環形次依環濶改作方環圓環當方環四分之三故止作方環之三隅即與圓環等依圖分之成甲乙丙三方形丁戊己庚辛壬六直形尚餘癸子丑寅四弧矢形為圓減內切方形之餘積以圓三方二推之舊法謂圓內容方方居圓三分之二四弧矢形並當圓三分之一必當內方二分之一而卯癸辰方形亦當內方二分之一則四弧矢形必能補卯癸辰方形之闕而與辛壬丙三形並共輳成一震坎方形矣次移甲于巳移乙于午移丁于酉移戊于戌移己于亥移庚于乾尚闕未申二形故法取圓周至方角一步自乘二因之補入積內也自巳至申凡四形每形濶一步共四步故取圓周至方角之一步四因之為縱方也以平方帶縱開之得巽艮艮坎長濶相和之度減去縱方巽震餘震艮艮坎兩濶即圓徑圓徑之大于方弦者為兩邊之各一步故減之得方弦四十則諸雜線形求積第一圖可作一弧矢形而減一弧矢形第二圖可作半弧矢形而減半弧矢形第三圖可作兩弧矢形第四圖移甲丙實形補乙丁虛形成戊三角形又移己實形補庚虛形成辛三角形壬癸子各成三角形丑自成弧矢形此一大形內成三角形五弧矢形一第五圖甲乙各自成弧矢形丙丁辛各自成三角形移戊實形補己虛形庚亦成三角形癸借壬虛形亦成三角形得積減去壬圓形此一大形內成弧矢形二三角形五而減一圓形凡屬雜線形者皆依五形例裁之數學鑰卷二
