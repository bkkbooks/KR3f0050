body:
  text: 數學鑰天文算法類二算書之屬提要臣等謹案數學鑰六巻國朝杜知耕撰其書列古方田粟布裒分少廣商功均輸盈朒方程勾股九章取今線面體三部之法𨽻之載其圖解並摘其要語以為之注與方中通所撰數度衍用今法以合九章者體例相同而每章設例必標其凡於章首每問答有所旁通者必附其術於條下所引証之文必著其所出蒐輯尤詳梅文鼎勿菴歴算書記曰近代作者如李長茂算海詳説亦有發明然不能具九章惟方位伯數度衍於九章之外蒐羅甚富杜端伯數學鑰圖注九章頗中肯綮可為筭家程式其説固不誣矣世有二本其一為妄人竄亂殊失本真此本猶當日初刋今據以校正以復知耕之舊焉乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e6f777d1623ce6bf8ebd42b9bcfcf7261bcaf9113b1f6f2db9acbee6142f281a
